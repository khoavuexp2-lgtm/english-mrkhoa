<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Success 6 - Interactive English</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; }
        h1, h2, h3, .baloo-font { font-family: 'Baloo 2', cursive; }
        
        .scroll-container { height: calc(100vh - 80px); overflow-y: auto; scroll-behavior: smooth; padding-bottom: 80px; }
        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .glass-card { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; padding: 24px; margin-bottom: 24px; }
        
        .audio-row { cursor: pointer; transition: all 0.2s; border: 2px solid transparent; border-radius: 12px; }
        .audio-row:hover { background-color: #f8fafc; border-color: #cbd5e1; transform: translateX(4px); }
        .active-audio { background-color: #fef08a !important; border-color: #eab308 !important; }
        
        .chat-left { background: #f1f5f9; border-radius: 16px 16px 16px 0; padding: 12px 16px; display: inline-block; border: 1px solid #e2e8f0; max-width: 90%; }
        .chat-right { background: #e0e7ff; border-radius: 16px 16px 0 16px; padding: 12px 16px; display: inline-block; color: #1e3a8a; border: 1px solid #c7d2fe; text-align: left; max-width: 90%;}
        
        .q-btn { transition: all 0.2s; cursor: pointer; }
        .q-selected { background-color: #e0e7ff !important; border-color: #4f46e5 !important; color: #3730a3 !important; font-weight: bold; border-width: 2px;}
        .q-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: bold;}
        .q-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; text-decoration: line-through;}
        .disabled { pointer-events: none; opacity: 0.9;}

        .fill-input { border-bottom: 2px solid #cbd5e1; outline: none; background: transparent; text-align: center; font-weight: bold; color: #4f46e5; padding: 0 5px; transition: all 0.2s; }
        .fill-input:focus { border-bottom-color: #4f46e5; }
        .fill-correct { border-bottom-color: #22c55e !important; color: #166534 !important; background-color: #dcfce7; border-radius: 4px;}
        .fill-wrong { border-bottom-color: #ef4444 !important; color: #991b1b !important; background-color: #fee2e2; border-radius: 4px;}

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #e2e8f0; text-align: left;}
        th { background-color: #f8fafc; font-weight: 700; }

        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background-color: white; z-index: 100; transition: left 0.3s ease-in-out; box-shadow: 4px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 90; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .sidebar-overlay.open { display: block; opacity: 1; }
        
        .module-nav-btn { width: 100%; text-align: left; padding: 12px 16px; border-radius: 12px; font-weight: 600; color: #475569; transition: all 0.2s; margin-bottom: 8px;}
        .module-nav-btn:hover { background-color: #f1f5f9; }
        .module-nav-btn.active { background-color: #e0e7ff; color: #4338ca; border-left: 4px solid #4f46e5; }
        .module-nav-btn.exam-btn { border: 1px solid #fecdd3; background-color: #fff1f2; color: #be123c; }
        .module-nav-btn.exam-btn:hover { background-color: #ffe4e6; }
        .module-nav-btn.exam-btn.active { background-color: #fecdd3; color: #9f1239; border-left: 4px solid #e11d48; }
        
        .sbt-btn { border: 1px solid #fef08a; background-color: #fef9c3; color: #a16207; }
        .sbt-btn:hover { background-color: #fef08a; }
        .sbt-btn.active { background-color: #fde047; color: #854d0e; border-left: 4px solid #eab308; }

        .custom-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s; backdrop-filter: blur(2px);}
        .custom-alert-overlay.active { display: flex; opacity: 1;}
        .custom-alert-box { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: scale(0.9); transition: transform 0.2s;}
        .custom-alert-overlay.active .custom-alert-box { transform: scale(1);}

        /* 1. CSS Chế độ Trình Chiếu (Presentation Mode) */
        body.presentation-mode header, 
        body.presentation-mode .sidebar, 
        body.presentation-mode .sidebar-overlay,
        body.presentation-mode .unit-header-print { 
            display: none !important; 
        }
        body.presentation-mode #main-scroll { 
            height: 100vh !important; 
            padding-top: 20px; 
            font-size: 1.25rem !important; 
        }
        body.presentation-mode .max-w-4xl {
            max-width: 72rem !important;
        }
        body.presentation-mode .glass-card { 
            border: 2px solid #4f46e5 !important; 
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.15) !important; 
            margin-bottom: 40px !important;
        }
        .exit-presentation-btn { 
            display: none; 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 9999; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        body.presentation-mode .exit-presentation-btn { display: flex !important; }

        /* 2. CSS Chế độ In Đề Trắng (Blank Test Print) */
        @media print {
            body.printing-blank-test .q-correct, 
            body.printing-blank-test .q-wrong, 
            body.printing-blank-test .q-selected { 
                background: transparent !important; 
                color: black !important; 
                border-color: #94a3b8 !important; 
                font-weight: normal !important;
                text-decoration: none !important;
            }
            body.printing-blank-test .q-btn { 
                background: transparent !important; 
                border: 1px solid #000 !important; 
                color: #000 !important; 
            }
            body.printing-blank-test .fill-input,
            body.printing-blank-test .fill-correct,
            body.printing-blank-test .fill-wrong { 
                border: none !important; 
                border-bottom: 1px dotted #000 !important; 
                color: transparent !important; 
                background: transparent !important;
            }
            body.printing-blank-test #sbt-action-container, 
            body.printing-blank-test #exam-action-buttons,
            body.printing-blank-test #exam-navigator,
            body.printing-blank-test [id^="exp-"], 
            body.printing-blank-test [id^="exam-exp-"] { 
                display: none !important; 
            }

            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: A4 portrait; margin: 18mm 15mm 20mm 15mm; } 
            body { background: white !important; font-size: 11.5pt !important; color: #111 !important; line-height: 1.5 !important; overflow: visible !important; }
            .scroll-container { height: auto !important; overflow: visible !important; padding: 0 !important; }
            .no-print, header, .sidebar, .sidebar-overlay, #action-buttons, #exam-action-buttons, .submit-btn, .audio-row:hover, #listening-action-buttons, #exam-navigator { display: none !important; }
            
            #content-area { padding: 0 !important; max-width: 100% !important; }
            .glass-card { box-shadow: none !important; border: 1px solid #ccc !important; padding: 15px !important; margin-bottom: 15pt !important; background: transparent !important; page-break-inside: avoid !important; }
            section { page-break-inside: auto !important; margin-bottom: 15pt !important; }
            
            .unit-header-print { text-align: right; border-bottom: 3px solid #4f46e5; padding-bottom: 10px; margin-bottom: 25px; }
            .unit-header-print h1 { font-family: 'Arial', sans-serif !important; font-size: 24pt !important; font-weight: 900 !important; color: #4f46e5 !important; margin: 0; text-transform: uppercase; }
            .unit-header-print h2 { font-family: 'Arial', sans-serif !important; font-size: 12pt !important; font-weight: normal !important; color: #64748b !important; margin: 5px 0 0 0; letter-spacing: 2px; text-transform: uppercase; }
            .print-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12pt !important; }
        
            body.printing-modal #content-area { display: none !important; }
            body.printing-modal #studentReportModal { position: relative !important; display: block !important; width: 100% !important; max-width: 100% !important; background: transparent !important; z-index: auto !important; box-shadow: none !important; }
            body.printing-modal .custom-alert-overlay { background: transparent !important; backdrop-filter: none !important; }
            body.printing-modal .bg-white.rounded-2xl { box-shadow: none !important; max-height: none !important; overflow: visible !important; }
            body.printing-modal #reportModalContent { overflow: visible !important; background: white !important; }
        }
    </style>

    <!-- FIREBASE INITIALIZATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDocs, getDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZPXXQJXN3Y1mWwYBNCcLjGSusRqjwqrA",
            authDomain: "tienganh6thaykhoadeptrai.firebaseapp.com",
            projectId: "tienganh6thaykhoadeptrai",
            storageBucket: "tienganh6thaykhoadeptrai.firebasestorage.app",
            messagingSenderId: "924106863588",
            appId: "1:924106863588:web:e702ff575534036b950df1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fauth = auth;
        window.fdb = db;
        window.fCollection = collection;
        window.fAddDoc = addDoc;
        window.fDoc = doc;
        window.fSetDoc = setDoc;
        window.fGetDoc = getDoc;
        window.fGetDocs = getDocs;
        window.fUpdateDoc = updateDoc;
        window.fDeleteDoc = deleteDoc;
        window.fQuery = query;
        window.fWhere = where;

        const SUPER_ADMIN_EMAILS = ["khoavuexp2@gmail.com", "khoavuexp@gmail.com"];

        window.loginWithGoogle = async function() {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } 
            catch (error) { console.error(error); window.showCustomAlert("Error", "Login failed.", "⚠️"); }
        }

        window.logoutGoogle = async function() {
            await signOut(auth);
            window.location.reload();
        }

        onAuthStateChanged(auth, async (user) => {
            const authContainer = document.getElementById('auth-container');
            const nicknameOverlay = document.getElementById('nicknameOverlay');
            const printBtn = document.getElementById('print-btn');

            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                let nickname = user.displayName || user.email.split('@')[0];
                let isNewUser = false;
                
                window.isSuperAdmin = SUPER_ADMIN_EMAILS.includes(user.email);
                let userRole = 'student';
                let classId = '';

                if (userSnap.exists()) {
                    const data = userSnap.data();
                    if (data.status === 'blocked') {
                        window.showCustomAlert("Locked", "Your account has been suspended.", "🔒");
                        await signOut(auth); return;
                    }
                    if (data.plan !== 'lifetime' && data.expiryDate && Date.now() > data.expiryDate) {
                        window.showCustomAlert("Expired", "Your learning plan has expired.", "⏳");
                        await signOut(auth); return;
                    }
                    nickname = data.nickname || nickname;
                    userRole = data.role || 'student';
                    classId = data.classId || '';
                } else {
                    isNewUser = true;
                    window.pendingUser = user;
                    nicknameOverlay.classList.add('active');
                    return; 
                }

                window.isAdmin = window.isSuperAdmin || userRole === 'teacher';
                window.currentUser = { uid: user.uid, email: user.email, nickname: nickname, role: userRole, classId: classId, classIds: userSnap.exists() ? userSnap.data().classIds || [] : [] };

                authContainer.innerHTML = `
                    <div class="flex items-center gap-2">
                        <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-200 cursor-pointer hover:bg-indigo-100" onclick="showNicknameModal()">
                            <img src="${user.photoURL || 'https://www.svgrepo.com/show/475656/google-color.svg'}" class="w-6 h-6 rounded-full">
                            <span class="text-sm font-bold text-indigo-700 truncate max-w-[120px] sm:max-w-[200px]">${nickname}</span>
                        </div>
                        <button onclick="logoutGoogle()" class="text-xs text-rose-500 hover:text-rose-700 font-bold whitespace-nowrap ml-1">Sign Out</button>
                    </div>
                `;

                if(printBtn) {
                    if (window.isAdmin) {
                        printBtn.classList.remove('hidden');
                        document.getElementById('present-btn').classList.remove('hidden');
                        window.preloadAdminData(); // PRE-LOAD DATA CHO GIAO BÀI
                    }
                    else {
                        printBtn.classList.add('hidden');
                        document.getElementById('present-btn').classList.add('hidden');
                    }
                }
                
                if (!isNewUser) await updateDoc(userRef, { lastLogin: Date.now() });
                window.renderMenu();

            } else {
                window.currentUser = null; window.isAdmin = false; window.isSuperAdmin = false;
                authContainer.innerHTML = `<button onclick="loginWithGoogle()" class="flex items-center gap-2 bg-white border border-slate-300 shadow-sm text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-xl text-sm font-bold transition-colors"><img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4"> Sign In</button>`;
                
                if(printBtn) {
                    printBtn.classList.add('hidden');
                    document.getElementById('present-btn').classList.add('hidden');
                }
                window.renderMenu();
                
                if (window.currentModule && (window.currentModule.type === 'exam_module' || window.currentModule.id === 'u5') && window.currentModule.id !== 'rev1') {
                    window.showCustomAlert("Required", "Please sign in to continue.", "🔒");
                    window.loadModule('u1');
                }
            }
        });
    </script>
</head>

    <script>
        // --- CHẾ ĐỘ TRÌNH CHIẾU ---
        window.togglePresentationMode = function() {
            document.body.classList.toggle('presentation-mode');
            if (document.body.classList.contains('presentation-mode')) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.getElementById('main-scroll').scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        // --- TTS AUDIO ENGINE ---
        window.voices = [];
        window.speechSynthesis.onvoiceschanged = () => { window.voices = window.speechSynthesis.getVoices(); };
        window.getVoiceByGender = function(gender, lang = 'en-US') {
            if (window.voices.length === 0) window.voices = window.speechSynthesis.getVoices();
            const femaleKeywords = ['female', 'zira', 'samantha', 'victoria', 'karen', 'susan'];
            const maleKeywords = ['male', 'david', 'daniel', 'alex', 'george', 'mark'];
            let selectedVoice = null;
            if (gender === 'female') { selectedVoice = window.voices.find(v => femaleKeywords.some(kw => v.name.toLowerCase().includes(kw))); } 
            else if (gender === 'male') { selectedVoice = window.voices.find(v => maleKeywords.some(kw => v.name.toLowerCase().includes(kw))); }
            if (!selectedVoice) { selectedVoice = window.voices.find(v => v.lang === lang) || window.voices.find(v => v.lang.startsWith(lang.split('-')[0])); }
            return selectedVoice;
        };

        window.highlightAudioRow = function(element) {
            document.querySelectorAll('.audio-row').forEach(el => el.classList.remove('active-audio'));
            if(element) {
                let row = element.closest('.audio-row') || element;
                if(row.classList) row.classList.add('active-audio');
            }
        };

        window.removeHighlight = function() { 
            document.querySelectorAll('.audio-row').forEach(el => el.classList.remove('active-audio')); 
        };

        window.playAudio = function(element, encodedText, lang = 'en-US') {
            if(window.event) window.event.stopPropagation();
            window.highlightAudioRow(element);
            window.speechSynthesis.cancel();
            let text = "";
            try { text = decodeURIComponent(encodedText); } catch(e) { text = encodedText; }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang; utterance.rate = 0.85;
            let voice = window.voices.find(v => v.lang === lang || v.lang.startsWith(lang.split('-')[0]));
            if(voice) utterance.voice = voice;
            utterance.onend = window.removeHighlight; utterance.onerror = window.removeHighlight;
            window.speechSynthesis.speak(utterance);
        };

        window.playDialogueLine = function(element, encodedText, gender) {
            if(window.event) window.event.stopPropagation();
            window.highlightAudioRow(element);
            window.speechSynthesis.cancel();
            let text = "";
            try { text = decodeURIComponent(encodedText); } catch(e) { text = encodedText; }
            const utterance = new SpeechSynthesisUtterance(text);
            const voice = window.getVoiceByGender(gender, 'en-US');
            if(voice) utterance.voice = voice;
            utterance.lang = 'en-US'; utterance.rate = 0.85;
            utterance.onend = window.removeHighlight; utterance.onerror = window.removeHighlight;
            window.speechSynthesis.speak(utterance);
        };

        window.toggleTranscript = function(btn) {
            if(window.event) window.event.stopPropagation();
            const container = btn.closest('.glass-card');
            if(!container) return;
            const el = container.querySelector('.audio-transcript');
            if(el) {
                el.classList.toggle('hidden');
            }
        };

        window.playAllDialogue = function() {
            if(window.event) window.event.stopPropagation();
            window.speechSynthesis.cancel(); window.removeHighlight();
            let listeningSec = window.currentModule.sections.find(s => s.type === 'listening' || s.type === 'dialogue');
            if(!listeningSec || !listeningSec.lines) return;
            let currentLine = 0;
            
            function speakNextLine() {
                if(currentLine >= listeningSec.lines.length) {
                    window.removeHighlight();
                    return;
                }
                let l = listeningSec.lines[currentLine];
                
                document.querySelectorAll('.audio-row').forEach(el => el.classList.remove('active-audio'));
                const dialogueContainer = document.querySelector('.glass-card .space-y-3.mb-8');
                if(dialogueContainer && dialogueContainer.children[currentLine]) {
                    dialogueContainer.children[currentLine].classList.add('active-audio');
                }

                let utterance = new SpeechSynthesisUtterance(l.t || l.text);
                const voice = window.getVoiceByGender(l.gender, l.loc || 'en-US');
                if(voice) utterance.voice = voice;
                utterance.lang = l.loc || 'en-US'; utterance.rate = 0.85;
                utterance.onend = () => { currentLine++; speakNextLine(); };
                utterance.onerror = () => { currentLine++; speakNextLine(); };
                window.speechSynthesis.speak(utterance);
            }
            speakNextLine();
        };

        // ==========================================
        // DATABASE SECTIONS
        // ==========================================
       window.themBaiHoc = function(unitData) {

        };


themBaiHoc({
    id: "u1", type: "lesson", title: "Unit 1: My New School",
    sections: [
        { type: "objectives", title: "I. Objectives", content: `<ul class="list-disc pl-5 text-slate-700 space-y-2"><li><b>Vocabulary:</b> School things and activities.</li><li><b>Grammar:</b> Present Simple vs Present Continuous.</li><li><b>Pronunciation:</b> Sounds /ɑː/ and /ʌ/.</li></ul>` },
        { type: "vocab", title: "II. Vocabulary", words: [{ w: "boarding school", p: "/ˈbɔː.dɪŋ ˌskuːl/", m: "Trường nội trú" }, { w: "international school", p: "/ˌɪn.təˈnæʃ.ən.əl skuːl/", m: "Trường quốc tế" }, { w: "equipment", p: "/ɪˈkwɪp.mənt/", m: "Thiết bị (Uncountable)" }, { w: "compass", p: "/ˈkʌm.pəs/", m: "Compa" }, { w: "calculator", p: "/ˈkæl.kjə.leɪ.tər/", m: "Máy tính bỏ túi" }, { w: "uniform", p: "/ˈjuː.nɪ.fɔːm/", m: "Đồng phục" }, { w: "rubber", p: "/ˈrʌb.ər/", m: "Cục tẩy" }, { w: "backpack", p: "/ˈbæk.pæk/", m: "Ba lô" }], collocations: [{ word: "PLAY", items: "football, sports, games" }, { word: "DO", items: "homework, judo, exercise" }, { word: "HAVE", items: "lunch, a lesson, a uniform" }, { word: "STUDY", items: "English, maths, science" }] },
        { type: "grammar", title: "III. Grammar", content: `<div class="glass-card note-box-print border-l-4 border-l-emerald-500 mb-6"><h3 class="font-bold text-lg text-emerald-800 mb-2 print:text-black">1. Present Simple (Thì Hiện Tại Đơn)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage (Cách dùng):</b><br>• Diễn tả thói quen, hành động lặp đi lặp lại (Habits, routines).<br>• Diễn tả sự thật hiển nhiên, chân lý (General truths).<br>• Diễn tả lịch trình, thời gian biểu cố định của tàu xe, phim ảnh (Timetables).</div><table class="mb-4 bg-white text-sm w-full"><tr><th class="w-1/4 bg-emerald-50 text-emerald-800">(+) Affirmative</th><td><b>I/You/We/They + V</b> <br> <b>He/She/It + V(s/es)</b></td></tr><tr><th class="bg-rose-50 text-rose-800">(-) Negative</th><td>S + <b>don't / doesn't</b> + V(infinitive/nguyên mẫu)</td></tr><tr><th class="bg-amber-50 text-amber-800">(?) Interrogative</th><td><b>Do / Does</b> + S + V(infinitive/nguyên mẫu)?</td></tr></table><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-rose-50 border border-rose-200 p-4 rounded-xl w-full"><h4 class="font-bold text-rose-800 text-sm mb-2 print:text-black">📝 Adding -s / -es (Quy tắc thêm s/es)</h4><ul class="text-sm space-y-1"><li>• End in <b class="text-rose-600 print:text-black">o, s, x, z, ch, sh</b> ➔ add <b>-es</b> (go ➔ goes)</li><li>• Consonant + <b class="text-rose-600 print:text-black">y</b> ➔ change to <b>-ies</b> (study ➔ studies)</li><li>• Others ➔ add <b>-s</b> (play ➔ plays)</li></ul></div><div class="bg-amber-50 border border-amber-200 p-4 rounded-xl w-full"><h4 class="font-bold text-amber-800 text-sm mb-2 print:text-black">⏳ Adverbs of Frequency (Trạng từ tần suất)</h4><p class="text-sm"><i>always, usually, often, sometimes, never</i></p><p class="text-sm mt-1">• <b>Before normal verbs:</b> I <i>always get</i> up early.</p><p class="text-sm">• <b>After To-Be:</b> He <i>is usually</i> late.</p></div></div></div><div class="glass-card note-box-print border-l-4 border-l-blue-500 mb-6"><h3 class="font-bold text-lg text-blue-800 mb-2 print:text-black">2. Present Continuous (Thì Hiện Tại Tiếp Diễn)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage (Cách dùng):</b><br>• Diễn tả hành động đang xảy ra ngay lúc nói (Happening right now).<br>• Diễn tả một kế hoạch chắc chắn sẽ xảy ra trong tương lai gần (Future arrangements).</div><table class="mb-4 bg-white text-sm w-full"><tr><th class="w-1/4 bg-blue-50 text-blue-800">(+) Affirmative</th><td>S + <b>am/is/are + V-ing</b></td></tr><tr><th class="bg-rose-50 text-rose-800">(-) Negative</th><td>S + <b>am/is/are + NOT + V-ing</b></td></tr><tr><th class="bg-amber-50 text-amber-800">(?) Interrogative</th><td><b>Am/Is/Are</b> + S + <b>V-ing?</b></td></tr></table><div class="bg-cyan-50 border border-cyan-200 p-4 rounded-xl text-sm"><h4 class="font-bold text-cyan-800 mb-2 print:text-black">📝 Adding -ing (Quy tắc thêm -ing):</h4><p>• Remove "e" ➔ add "-ing" (make ➔ making) <br> • 1 vowel between 2 consonants ➔ <b>Double last consonant</b> (run ➔ running).</p></div></div><div class="glass-card note-box-print border-t-4 border-t-purple-500 bg-purple-50/30"><h3 class="font-bold text-lg text-purple-800 mb-2 print:text-black">💡 Distinction (Phân Biệt Nhanh Để Làm Bài Thi)</h3><table class="w-full text-sm bg-white border border-slate-200 shadow-sm"><tr><th class="w-1/2 bg-emerald-100 text-emerald-800 p-3 border-r">Present Simple (HT Đơn)</th><th class="w-1/2 bg-blue-100 text-blue-800 p-3">Present Continuous (HT Tiếp Diễn)</th></tr><tr><td class="p-3 align-top border-r"><b>Dấu hiệu:</b> always, usually, often, sometimes, never, every (day/week)...<br><b>Ví dụ:</b> I <i>play</i> football every Sunday.</td><td class="p-3 align-top"><b>Dấu hiệu:</b> now, right now, at present, at the moment, Look!, Listen!...<br><b>Ví dụ:</b> Look! They <i>are playing</i> football now.</td></tr></table></div>` },
        { type: "pronunciation", title: "IV. Pronunciation", content: `<div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm text-center note-box-print"><div class="font-bold text-3xl text-indigo-600 mb-2">/ɑː/</div><p class="text-sm text-slate-500 mb-4">Long sound, open your mouth wide.</p><div class="text-slate-800 font-bold audio-row p-2" data-text="smart, art, class" onclick="window.playAudio(this.dataset.text, 'en-US')">sm<span class="text-indigo-600">ar</span>t, <span class="text-indigo-600">ar</span>t, cl<span class="text-indigo-600">a</span>ss</div></div><div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm text-center note-box-print"><div class="font-bold text-3xl text-rose-500 mb-2">/ʌ/</div><p class="text-sm text-slate-500 mb-4">Short, quick sound.</p><div class="text-slate-800 font-bold audio-row p-2" data-text="subject, study, compass" onclick="window.playAudio(this.dataset.text, 'en-US')">s<span class="text-rose-500">u</span>bject, st<span class="text-rose-500">u</span>dy, c<span class="text-rose-500">o</span>mpass</div></div></div>` },
        { type: "listening", title: "V. Listening & Role-play", lines: [{ c: "Emma", a: "👩🏻", t: "Hi Alex! Are you ready for our first day at the new school? You look smart in your uniform!", loc: "en-US", gender: "female" }, { c: "Alex", a: "👦🏻", t: "Thanks, Emma! I am putting on my backpack. Oh, look! Ben is coming.", loc: "en-US", gender: "male" }, { c: "Emma", a: "👩🏻", t: "He is carrying a heavy backpack.", loc: "en-US", gender: "female" }, { c: "Ben", a: "👦🏼", t: "Good morning guys! I always pack my school bag carefully. Do you have your compass and calculator?", loc: "en-US", gender: "male" }, { c: "Alex", a: "👦🏻", t: "Yes, I do. I heard our school has modern equipment.", loc: "en-US", gender: "male" }, { c: "Ben", a: "👦🏼", t: "That's right! We can play football and do judo after lessons.", loc: "en-US", gender: "male" }, { c: "Emma", a: "👩🏻", t: "Awesome! By the way, my cousin studies at a boarding school. He only goes home on weekends.", loc: "en-US", gender: "female" }, { c: "Alex", a: "👦🏻", t: "Really? Let's go now, we have an English lesson.", loc: "en-US", gender: "male" }] },
        { type: "speaking", title: "VI. Speaking", topic: "Topic: Describe your new school", prompts: ["1. General: What is the name of your school? Is it a boarding or international school?", "2. Equipment: What equipment does it have? (e.g., smart boards, modern computer room, library)", "3. Activities: What do you always/usually do at break time or after lessons? (e.g., play football, do judo)", "4. Uniform: Do you wear a uniform every day?"], sample: "Hello everyone. My name is Nam. I study at Global Secondary School. It is very big. My school has modern equipment like smart boards and a large library. I usually wear my uniform on Mondays and Thursdays. At break time, I always play football with my friends in the schoolyard. Sometimes, I do judo in the gym after lessons. I love my new school very much!" },
        { type: "listening_task", title: "VII. Listening Comprehension", audioScript: "Hello, my name is Minh. I am very happy today because it is my first day at Global International School. My school is very large and it has modern equipment. Look! Some students are playing football in the playground. I always wear my new uniform on Mondays and Wednesdays. Right now, I am standing in the library. I have my compass, calculator, and a notebook in my backpack. I am waiting for my new friends. We are studying maths next.", questions: [{ id: "u1_lt1", q: "1. What kind of school does Minh go to?", opts: ["A. A boarding school", "B. An international school", "C. A small school"], ans: 1 }, { id: "u1_lt2", q: "2. What are some students doing in the playground?", opts: ["A. Playing football", "B. Doing judo", "C. Studying maths"], ans: 0 }, { id: "u1_lt3", q: "3. How often does Minh wear his uniform?", opts: ["A. Every day", "B. On Mondays and Wednesdays", "C. Only on Mondays"], ans: 1 }, { id: "u1_lt4", q: "4. True or False: Minh is waiting for his parents in the library.", opts: ["A. True", "B. False"], ans: 1 }] },
        { type: "practice", title: "VIII. Practice", exercises: [{ id: '1', type: 'choice', q: "1. Choose the correct word: We use a _____ to draw a circle.", opts: ["A. calculator", "B. compass", "C. rubber"], ans: 1, exp: "Compass (compa) dùng để vẽ hình tròn." }, { id: '2', type: 'grammar', q: "2. My brother _______ his uniform every day.", opts: ["A. wear", "B. wears", "C. is wearing"], ans: 1, exp: "Dấu hiệu 'every day' -> Hiện tại đơn. Chủ ngữ số ít -> wears." }, { id: '3', type: 'grammar', q: "3. Look! The students _______ football in the playground.", opts: ["A. play", "B. plays", "C. are playing"], ans: 2, exp: "Dấu hiệu 'Look!' -> Hiện tại tiếp diễn." }, { id: '4', type: 'choice', q: "4. I study at a _______ school. I sleep and eat there.", opts: ["A. boarding", "B. international", "C. smart"], ans: 0, exp: "Trường nội trú là boarding school." }, { id: '5', type: 'grammar', q: "5. They usually _______ judo in the afternoon.", opts: ["A. play", "B. do", "C. make"], ans: 1, exp: "Tập võ dùng động từ 'do' (do judo)." }] }

        { type: "grammar", title: "III. Grammar", content: `<div class="glass-card note-box-print border-l-4 border-l-emerald-500 mb-6"><h3 class="font-bold text-lg text-emerald-800 mb-2 print:text-black">1. Possessive Case (Sở hữu cách 's)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage (Cách dùng):</b> Dùng để chỉ sự sở hữu (Cái gì thuộc về ai). Thường dùng cho người hoặc động vật.</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-emerald-50 border border-emerald-200 p-4 rounded-xl w-full"><h4 class="font-bold text-emerald-800 text-sm mb-2 print:text-black">📝 Danh từ số ít / Tên riêng</h4><p class="text-sm text-slate-700">Thêm <b class="text-emerald-600 text-base print:text-black">'s</b> vào sau danh từ sở hữu.</p><ul class="text-sm mt-2 space-y-1"><li>• Emma<b>'s</b> room <i>(Phòng của Emma)</i></li><li>• My mother<b>'s</b> book <i>(Sách của mẹ tôi)</i></li></ul></div><div class="bg-blue-50 border border-blue-200 p-4 rounded-xl w-full"><h4 class="font-bold text-blue-800 text-sm mb-2 print:text-black">📝 Danh từ số nhiều có sẵn "s"</h4><p class="text-sm text-slate-700">Chỉ thêm dấu nháy đơn <b class="text-blue-600 text-base print:text-black">'</b> vào cuối.</p><ul class="text-sm mt-2 space-y-1"><li>• The students<b>'</b> bags <i>(Cặp của các học sinh)</i></li><li>• My parents<b>'</b> bedroom <i>(Phòng của bố mẹ)</i></li></ul></div></div></div><div class="glass-card note-box-print border-l-4 border-l-blue-500 mb-6"><h3 class="font-bold text-lg text-blue-800 mb-2 print:text-black">2. Prepositions of Place (Giới từ chỉ nơi chốn)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage:</b> Dùng để chỉ vị trí của người hoặc vật.</div><div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm mb-4 font-medium text-slate-800"><div class="p-3 bg-slate-50 border border-slate-200 rounded-lg text-center cursor-pointer hover:bg-blue-50" onclick="window.playAudio('in', 'en-US')"><b>in</b><br><span class="text-slate-500 font-normal">ở trong</span></div><div class="p-3 bg-slate-50 border border-slate-200 rounded-lg text-center cursor-pointer hover:bg-blue-50" onclick="window.playAudio('on', 'en-US')"><b>on</b><br><span class="text-slate-500 font-normal">ở trên (bề mặt)</span></div><div class="p-3 bg-slate-50 border border-slate-200 rounded-lg text-center cursor-pointer hover:bg-blue-50" onclick="window.playAudio('under', 'en-US')"><b>under</b><br><span class="text-slate-500 font-normal">ở dưới</span></div><div class="p-3 bg-slate-50 border border-slate-200 rounded-lg text-center cursor-pointer hover:bg-blue-50" onclick="window.playAudio('behind', 'en-US')"><b>behind</b><br><span class="text-slate-500 font-normal">đằng sau</span></div><div class="p-3 bg-slate-50 border border-slate-200 rounded-lg text-center cursor-pointer hover:bg-blue-50" onclick="window.playAudio('next to', 'en-US')"><b>next to</b><br><span class="text-slate-500 font-normal">kế bên</span></div><div class="p-3 bg-slate-50 border border-slate-200 rounded-lg text-center cursor-pointer hover:bg-blue-50" onclick="window.playAudio('in front of', 'en-US')"><b>in front of</b><br><span class="text-slate-500 font-normal">phía trước</span></div><div class="p-3 bg-slate-50 border border-slate-200 rounded-lg text-center md:col-span-2 cursor-pointer hover:bg-blue-50" onclick="window.playAudio('between', 'en-US')"><b>between ... and ...</b><br><span class="text-slate-500 font-normal">ở giữa (2 vật)</span></div></div></div>` },

        { type: "listening", title: "V. Listening & Role-play", lines: [{ c: "Emma", a: "👩🏻", t: "Welcome to my new house, Alex!", loc: "en-US", gender: "female" }, { c: "Alex", a: "👦🏻", t: "Wow, it's beautiful. Is this the living room?", loc: "en-US", gender: "male" }, { c: "Emma", a: "👩🏻", t: "Yes. Look at the big sofa.", loc: "en-US", gender: "female" }, { c: "Alex", a: "👦🏻", t: "What is that behind the sofa?", loc: "en-US", gender: "male" }, { c: "Emma", a: "👩🏻", t: "It's a modern lamp. Let's go to the kitchen.", loc: "en-US", gender: "female" }, { c: "Alex", a: "👦🏻", t: "You have a big fridge! And the dishwasher is next to the sink.", loc: "en-US", gender: "male" }, { c: "Emma", a: "👩🏻", t: "Exactly. My bedroom is upstairs, between the bathroom and my brother's room.", loc: "en-US", gender: "female" }, { c: "Alex", a: "👦🏻", t: "Let's go see it!", loc: "en-US", gender: "male" }] },

        { type: "listening_task", title: "VII. Listening Comprehension", audioScript: "Welcome to my house. I live in a beautiful stilt house with my family. It is made of wood. There are four rooms: a living room, a kitchen, a bathroom, and my bedroom. The living room is very big. There is a comfortable sofa and a television in front of it. Now, I am cooking in the kitchen. The fridge is next to the cupboard. My favourite room is my bedroom. My bed is between the wardrobe and the window. I usually read books under the lamp.", questions: [{ id: "u2_lt1", q: "1. What type of house does the speaker live in?", opts: ["A. A townhouse", "B. A stilt house", "C. A villa"], ans: 1 }, { id: "u2_lt2", q: "2. Where is the television?", opts: ["A. In front of the sofa", "B. Behind the sofa", "C. Next to the cupboard"], ans: 0 }, { id: "u2_lt3", q: "3. What is the speaker doing now?", opts: ["A. Reading a book", "B. Cooking in the kitchen", "C. Sleeping in the bedroom"], ans: 1 }, { id: "u2_lt4", q: "4. True or False: The bed is between the wardrobe and the window.", opts: ["A. True", "B. False"], ans: 0 }] },

        { type: "grammar", title: "IV. Grammar", content: `<div class="glass-card note-box-print border-l-4 border-l-emerald-500 mb-6"><h3 class="font-bold text-lg text-emerald-800 mb-2 print:text-black">1. Asking about Appearance & Personality (Hỏi về ngoại hình & tính cách)</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-emerald-50 border border-emerald-200 p-4 rounded-xl w-full"><h4 class="font-bold text-emerald-800 text-sm mb-2 print:text-black">👁️ Appearance (Ngoại hình)</h4><p class="text-sm font-bold text-slate-800 mb-2">Q: What does he/she <span class="text-emerald-600">look like</span>?</p><ul class="text-sm mt-2 space-y-2 text-slate-700"><li>A: She <b>is</b> tall and slim.</li><li>A: He <b>has</b> short curly hair.</li></ul></div><div class="bg-blue-50 border border-blue-200 p-4 rounded-xl w-full"><h4 class="font-bold text-blue-800 text-sm mb-2 print:text-black">🧠 Personality (Tính cách)</h4><p class="text-sm font-bold text-slate-800 mb-2">Q: What is he/she <span class="text-blue-600">like</span>?</p><ul class="text-sm mt-2 space-y-2 text-slate-700"><li>A: She <b>is</b> very kind and funny.</li><li>A: He <b>is</b> clever but a bit shy.</li></ul></div></div></div><div class="glass-card note-box-print border-l-4 border-l-blue-500 mb-6"><h3 class="font-bold text-lg text-blue-800 mb-2 print:text-black">2. Present Continuous for Future (Hiện tại tiếp diễn mang nghĩa tương lai)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage (Cách dùng):</b><br>Chúng ta có thể dùng thì Hiện tại tiếp diễn (S + am/is/are + V-ing) để diễn tả <b>một kế hoạch hoặc dự định đã được lên lịch sẵn</b> trong tương lai gần.</div><div class="bg-cyan-50 border border-cyan-200 p-4 rounded-xl text-sm"><h4 class="font-bold text-cyan-800 mb-2 print:text-black">💡 Ví dụ (Examples):</h4><ul class="space-y-2"><li>• We <b>are going</b> to the cinema <i>tomorrow</i>. (Ngày mai chúng tôi sẽ đi xem phim - đã mua vé).</li><li>• She <b>is playing</b> tennis <i>this weekend</i>. (Cô ấy sẽ chơi tennis cuối tuần này - đã hẹn bạn).</li></ul></div></div>` },

        { type: "listening", title: "VI. Dialogue & Role-play", lines: [{ c: "Tom", a: "👦🏼", t: "Hi Sarah! Look at that girl over there. Who is she?", loc: "en-US", gender: "male" }, { c: "Sarah", a: "👩🏻", t: "Oh, that is Mai. She is my new friend.", loc: "en-US", gender: "female" }, { c: "Tom", a: "👦🏼", t: "She is tall. And she has long black hair.", loc: "en-US", gender: "male" }, { c: "Sarah", a: "👩🏻", t: "Yes, and big brown eyes too. She is very pretty.", loc: "en-US", gender: "female" }, { c: "Tom", a: "👦🏼", t: "What is she like?", loc: "en-US", gender: "male" }, { c: "Sarah", a: "👩🏻", t: "She is kind and very creative. She likes drawing.", loc: "en-US", gender: "female" }, { c: "Tom", a: "👦🏼", t: "Are you doing anything this weekend?", loc: "en-US", gender: "male" }, { c: "Sarah", a: "👩🏻", t: "Yes, Mai and I are going to the museum on Saturday.", loc: "en-US", gender: "female" }] },
        { type: "speaking", title: "VII. Speaking", topic: "Topic: Describe your best friend", prompts: ["1. Who is your best friend?", "2. What does he/she look like? (Appearance: tall/short, hair, eyes...)", "3. What is he/she like? (Personality: kind, funny, clever...)", "4. Why do you like him/her?"], sample: "My best friend is Nam. He is tall and slim. He has short black hair and big eyes. Nam is very funny and clever. He always makes me laugh. I like him because he is a kind friend." },
        { type: "listening_task", title: "VIII. Listening Comprehension", audioScript: "My best friend is Chau. She is a beautiful girl with long straight black hair and a round face. She is quite tall and slim. Chau is very confident and hard-working. She always does her homework before class. This Sunday, we are having a picnic in the park with our classmates. I am bringing some biscuits and fruit.", questions: [{ id: "u3_lt1", q: "1. What kind of hair does Chau have?", opts: ["A. Short curly hair", "B. Long straight black hair", "C. Long blonde hair"], ans: 1 }, { id: "u3_lt2", q: "2. What is Chau's personality?", opts: ["A. Shy and kind", "B. Funny and creative", "C. Confident and hard-working"], ans: 2 }, { id: "u3_lt3", q: "3. What are they doing this Sunday?", opts: ["A. Having a picnic", "B. Going to the cinema", "C. Doing homework"], ans: 0 }, { id: "u3_lt4", q: "4. True or False: The speaker is bringing biscuits and fruit to the picnic.", opts: ["A. True", "B. False"], ans: 0 }] },

        { type: "objectives", title: "I. Objectives", content: `<ul class="list-disc pl-5 text-slate-700 space-y-2"><li><b>Vocabulary:</b> Places in a neighbourhood and adjectives.</li><li><b>Grammar:</b> Comparative Adjectives (So sánh hơn).</li><li><b>Pronunciation:</b> Sounds /ɪ/ and /iː/.</li></ul>` },
        { type: "vocab", title: "II. Vocabulary: Places & Adjectives", words: [{ w: "square", p: "/skweər/", m: "Quảng trường" }, { w: "art gallery", p: "/ɑːt ˈɡæl.ər.i/", m: "Phòng triển lãm nghệ thuật" }, { w: "railway station", p: "/ˈreɪl.weɪ ˌsteɪ.ʃən/", m: "Nhà ga xe lửa" }, { w: "historic", p: "/hɪˈstɒr.ɪk/", m: "Cổ kính, có tính lịch sử" }, { w: "peaceful", p: "/ˈpiːs.fəl/", m: "Yên bình, thanh bình" }, { w: "noisy", p: "/ˈnɔɪ.zi/", m: "Ồn ào, náo nhiệt" }, { w: "modern", p: "/ˈmɒd.ən/", m: "Hiện đại" }, { w: "narrow", p: "/ˈnær.əʊ/", m: "Chật hẹp (>< wide: rộng)" }], collocations: [{ word: "GO", items: "straight (đi thẳng)" }, { word: "TURN", items: "left (rẽ trái), right (rẽ phải)" }, { word: "CROSS", items: "the street (sang đường)" }, { word: "TAKE", items: "the second turning (rẽ ở ngã rẽ thứ 2)" }] },
        { type: "grammar", title: "III. Grammar: Comparative Adjectives", content: `<div class="glass-card note-box-print border-l-4 border-l-emerald-500 mb-6"><h3 class="font-bold text-lg text-emerald-800 mb-2 print:text-black">1. Short Adjectives (Tính từ ngắn)</h3><div class="text-sm mb-4 text-slate-700"><b>Định nghĩa:</b> Tính từ có 1 âm tiết, hoặc 2 âm tiết nhưng kết thúc bằng "y, er, ow, le, et".<br><b>Công thức:</b> S1 + to be + <b>Adj-ER + than</b> + S2.</div><div class="bg-emerald-50 border border-emerald-200 p-4 rounded-xl text-sm mb-4"><h4 class="font-bold text-emerald-800 mb-2 print:text-black">📝 Quy tắc thêm -ER:</h4><ul class="space-y-1"><li>• Thêm trực tiếp: tall ➔ tall<b>er</b>, fast ➔ fast<b>er</b></li><li>• Tận cùng là e: wide ➔ wid<b>er</b></li><li>• Phụ âm - nguyên âm - phụ âm: hot ➔ ho<b>tter</b>, big ➔ bi<b>gger</b></li><li>• Tận cùng là y: noisy ➔ nois<b>ier</b>, busy ➔ bus<b>ier</b></li></ul></div><p class="text-sm bg-slate-100 p-2 rounded inline-block font-medium">Ex: My neighbourhood is <b>noisier than</b> your neighbourhood.</p></div><div class="glass-card note-box-print border-l-4 border-l-blue-500 mb-6"><h3 class="font-bold text-lg text-blue-800 mb-2 print:text-black">2. Long Adjectives & Irregular (Tính từ dài & Bất quy tắc)</h3><div class="text-sm mb-4 text-slate-700"><b>Định nghĩa:</b> Tính từ có từ 2 âm tiết trở lên.<br><b>Công thức:</b> S1 + to be + <b>MORE + Adj + than</b> + S2.</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-blue-50 border border-blue-200 p-4 rounded-xl text-sm"><h4 class="font-bold text-blue-800 mb-2 print:text-black">📝 Tính từ dài:</h4><ul class="space-y-1"><li>• modern ➔ <b>more</b> modern</li><li>• peaceful ➔ <b>more</b> peaceful</li><li>• expensive ➔ <b>more</b> expensive</li></ul></div><div class="bg-rose-50 border border-rose-200 p-4 rounded-xl text-sm"><h4 class="font-bold text-rose-800 mb-2 print:text-black">⚠️ Irregular (Bất quy tắc):</h4><ul class="space-y-1"><li>• good (tốt) ➔ <b>better</b></li><li>• bad (tệ) ➔ <b>worse</b></li><li>• far (xa) ➔ <b>farther/further</b></li></ul></div></div><p class="text-sm bg-slate-100 p-2 rounded inline-block font-medium">Ex: The city is <b>more modern than</b> the countryside.</p></div>` },
        { type: "pronunciation", title: "IV. Pronunciation", content: `<div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm text-center note-box-print"><div class="font-bold text-3xl text-indigo-600 mb-2">/ɪ/</div><p class="text-sm text-slate-500 mb-4">Short sound (Âm 'i' ngắn, hơi giống chữ 'ê')</p><div class="text-slate-800 font-bold audio-row p-2" onclick="window.playAudio('historic, busy, building', 'en-US')">h<span class="text-indigo-600">i</span>storic, b<span class="text-indigo-600">u</span>sy, bu<span class="text-indigo-600">i</span>lding</div></div><div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm text-center note-box-print"><div class="font-bold text-3xl text-rose-500 mb-2">/iː/</div><p class="text-sm text-slate-500 mb-4">Long sound, smile (Âm 'i' dài, kéo khóe miệng)</p><div class="text-slate-800 font-bold audio-row p-2" onclick="window.playAudio('peaceful, cheap, street', 'en-US')">p<span class="text-rose-500">ea</span>ceful, ch<span class="text-rose-500">ea</span>p, str<span class="text-rose-500">ee</span>t</div></div></div>` },
        { type: "listening", title: "V. Dialogue & Role-play", lines: [{ c: "Khang", a: "👦🏻", t: "Hi Vy. Where do you live?", loc: "en-US", gender: "male" }, { c: "Vy", a: "👩🏻", t: "I live in the suburbs of Ho Chi Minh City. What about you?", loc: "en-US", gender: "female" }, { c: "Khang", a: "👦🏻", t: "I live in the city centre. My neighbourhood is very busy and noisy.", loc: "en-US", gender: "male" }, { c: "Vy", a: "👩🏻", t: "I see. It is noisier than my neighbourhood. My place is very peaceful.", loc: "en-US", gender: "female" }, { c: "Khang", a: "👦🏻", t: "Yes, but the city centre is more modern. There are many tall buildings and a big square.", loc: "en-US", gender: "male" }, { c: "Vy", a: "👩🏻", t: "That's true. Are there any art galleries near your house?", loc: "en-US", gender: "female" }, { c: "Khang", a: "👦🏻", t: "Yes. Go straight, take the second turning on the left. It's next to the railway station.", loc: "en-US", gender: "male" }] },
        { type: "speaking", title: "VI. Speaking", topic: "Topic: Compare two places", prompts: ["1. Where do you live? Is it in the city or the countryside?", "2. What places are there in your neighbourhood? (square, grocery, memorial...)", "3. Compare your neighbourhood to another place using adjectives (busy, peaceful, noisy, narrow, wide)."], sample: "I live in the city centre. It is very busy and modern. There is a big square and a railway station. However, the streets are narrower than the streets in the suburbs. My hometown in the countryside is more peaceful and quieter than the city." },
        { type: "listening_task", title: "VII. Listening Comprehension", audioScript: "Welcome to my town. It is a historic town with many old houses. In the centre, there is a large square. Opposite the square is an old cathedral. My town is smaller than London, but I think it is more beautiful. The streets here are narrow, so there are not many cars. It is much quieter and more peaceful than the big city. If you want to buy food, you can go to the grocery near the railway station. It is cheaper there.", questions: [{ id: "u4_lt1", q: "1. What is opposite the large square?", opts: ["A. A railway station", "B. An old cathedral", "C. A grocery"], ans: 1 }, { id: "u4_lt2", q: "2. How is the town compared to London?", opts: ["A. Bigger and noisier", "B. Smaller but more beautiful", "C. More modern"], ans: 1 }, { id: "u4_lt3", q: "3. Why are there not many cars?", opts: ["A. Because the streets are narrow", "B. Because the town is poor", "C. Because people like walking"], ans: 0 }, { id: "u4_lt4", q: "4. Where is the grocery?", opts: ["A. In the square", "B. Near the railway station", "C. Next to the cathedral"], ans: 1 }] },
        { type: "practice", title: "VIII. Practice", exercises: [{ id: 'u4_p1', type: 'grammar', q: "1. This restaurant is ________ than that one.", opts: ["A. gooder", "B. better", "C. more good"], ans: 1, exp: "'Good' là tính từ bất quy tắc, so sánh hơn là 'better'." }, { id: 'u4_p2', type: 'grammar', q: "2. The countryside is ________ than the city.", opts: ["A. more peaceful", "B. peacefuler", "C. peaceful"], ans: 0, exp: "Peaceful là tính từ dài -> more peaceful." }, { id: 'u4_p3', type: 'choice', q: "3. A place where you take a train is a ________.", opts: ["A. square", "B. art gallery", "C. railway station"], ans: 2, exp: "Railway station: nhà ga xe lửa." }, { id: 'u4_p4', type: 'grammar', q: "4. Life in the city is ________ than in the country.", opts: ["A. noisyer", "B. noisier", "C. more noisy"], ans: 1, exp: "Tận cùng là 'y' -> đổi thành 'ier' (noisier)." }, { id: 'u4_p5', type: 'choice', q: "5. The streets are very ________. Cars cannot pass.", opts: ["A. wide", "B. narrow", "C. modern"], ans: 1, exp: "Narrow: chật hẹp." }] }
    ]
});

themBaiHoc({
    id: "u5", type: "lesson", title: "Unit 5: Natural Wonders of Vietnam",
    sections: [
        { type: "objectives", title: "I. Objectives", content: `<ul class="list-disc pl-5 text-slate-700 space-y-2"><li><b>Vocabulary:</b> Things in nature & Travel items.</li><li><b>Grammar:</b> Countable/Uncountable nouns & Modal verb: <b>Must / Mustn't</b>.</li><li><b>Pronunciation:</b> Sounds /t/ and /d/.</li></ul>` },
        { type: "vocab", title: "II. Vocabulary", words: [{ w: "waterfall", p: "/ˈwɔː.tə.fɔːl/", m: "Thác nước" }, { w: "cave", p: "/keɪv/", m: "Hang động" }, { w: "desert", p: "/ˈdez.ət/", m: "Sa mạc" }, { w: "island", p: "/ˈaɪ.lənd/", m: "Hòn đảo (Lưu ý âm 's' bị câm)" }, { w: "valley", p: "/ˈvæl.i/", m: "Thung lũng" }, { w: "plaster", p: "/ˈplɑː.stər/", m: "Băng cá nhân" }, { w: "painkiller", p: "/ˈpeɪnˌkɪl.ər/", m: "Thuốc giảm đau" }, { w: "sleeping bag", p: "/ˈsliː.pɪŋ ˌbæɡ/", m: "Túi ngủ du lịch" }, { w: "scissors", p: "/ˈsɪz.əz/", m: "Cái kéo (Luôn ở dạng số nhiều)" }, { w: "suncream", p: "/ˈsʌn.kriːm/", m: "Kem chống nắng" }], collocations: [{ word: "NATURE", items: "mountain, forest, river, lake, bay" }, { word: "ADJECTIVE", items: "amazing (tuyệt vời), diverse (đa dạng), essential (thiết yếu)" }, { word: "TRAVEL", items: "pack a backpack, take a boat, visit a cave" }] },
        { type: "grammar", title: "III. Grammar", content: `<div class="glass-card note-box-print border-l-4 border-l-emerald-500 mb-6"><h3 class="font-bold text-lg text-emerald-800 mb-2 print:text-black">1. Must / Mustn't (Phải / Cấm)</h3><div class="text-sm mb-4 text-slate-700">Dùng để diễn tả sự bắt buộc, nguyên tắc hoặc luật lệ (Rules & Obligations). Sau Must/Mustn't <b>LUÔN LÀ ĐỘNG TỪ NGUYÊN MẪU</b> (V-infinitive).</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-emerald-50 border border-emerald-200 p-4 rounded-xl w-full"><h4 class="font-bold text-emerald-800 text-sm mb-2 print:text-black">✅ MUST (Phải làm)</h4><p class="text-sm text-slate-700 mb-2">Chỉ ra việc <b>bắt buộc</b> phải làm, điều rất quan trọng và cần thiết.</p><ul class="text-sm space-y-2"><li>• You <b>must arrive</b> on time.</li><li>• We <b>must wear</b> a uniform at school.</li></ul></div><div class="bg-rose-50 border border-rose-200 p-4 rounded-xl w-full"><h4 class="font-bold text-rose-800 text-sm mb-2 print:text-black">❌ MUSTN'T (CẤM ĐOÁN)</h4><p class="text-sm text-slate-700 mb-2"><b>Lưu ý quan trọng:</b> Mustn't mang ý nghĩa <span class="text-rose-600 font-bold">CẤM ĐOÁN</span>, chứ không phải là "không cần".</p><ul class="text-sm space-y-2"><li>• You <b>mustn't step</b> on the grass.</li><li>• Students <b>mustn't cheat</b> in exams.</li></ul></div></div></div><div class="glass-card note-box-print border-l-4 border-l-blue-500 mb-6"><h3 class="font-bold text-lg text-blue-800 mb-2 print:text-black">2. Countable & Uncountable Nouns (Danh từ Đếm được & Không đếm được)</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-blue-50 border border-blue-200 p-4 rounded-xl text-sm"><h4 class="font-bold text-blue-800 mb-2 print:text-black">🔢 Countable (Đếm được):</h4><ul class="space-y-1 font-medium mb-3"><li>• Dùng được với <b>a/an</b> (a book, an apple).</li><li>• Có dạng số nhiều (thêm <b>s/es</b>: books).</li><li>• Dùng với: <b>many</b>, <b>a few</b>.</li></ul></div><div class="bg-amber-50 border border-amber-200 p-4 rounded-xl text-sm"><h4 class="font-bold text-amber-800 mb-2 print:text-black">💧 Uncountable (Không đếm được):</h4><ul class="space-y-1 font-medium mb-3 text-rose-600"><li>• <b>KHÔNG</b> dùng a/an/số đếm.</li><li>• <b>KHÔNG BAO GIỜ</b> thêm "s/es" (water).</li><li>• Dùng với: <b>much</b>, <b>a little</b>.</li></ul></div></div><div class="bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm"><p class="font-bold text-slate-800 mb-1">⚠️ CÁC TỪ KHÔNG ĐẾM ĐƯỢC HAY THI: </p><p class="text-slate-700">water, milk, sand, money, time, <b>luggage/baggage</b> (hành lý), <b>furniture</b> (đồ đạc), <b>information</b> (thông tin), <b>news</b> (tin tức).</p></div></div><div class="glass-card note-box-print border-l-4 border-l-purple-500 mb-6"><h3 class="font-bold text-lg text-purple-800 mb-2 print:text-black">3. Quantifiers (Phân biệt a few / few & a little / little)</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-purple-50 border border-purple-200 p-4 rounded-xl text-sm w-full"><h4 class="font-bold text-purple-800 mb-2 print:text-black">📦 + Danh từ đếm được (Số nhiều)</h4><ul class="space-y-3 font-medium text-slate-700"><li>• <span class="text-emerald-600 font-bold bg-emerald-100 px-1 rounded">A FEW</span> (Một vài): Tuy ít nhưng vẫn <b class="text-emerald-600">ĐỦ</b> dùng (Tích cực).</li><li>• <span class="text-rose-600 font-bold bg-rose-100 px-1 rounded">FEW</span> (Rất ít): Quá ít, <b class="text-rose-600">HẦU NHƯ KHÔNG CÓ</b> đủ (Tiêu cực).</li></ul></div><div class="bg-indigo-50 border border-indigo-200 p-4 rounded-xl text-sm w-full"><h4 class="font-bold text-indigo-800 mb-2 print:text-black">💧 + Danh từ KHÔNG đếm được</h4><ul class="space-y-3 font-medium text-slate-700"><li>• <span class="text-emerald-600 font-bold bg-emerald-100 px-1 rounded">A LITTLE</span> (Một ít): Tuy ít nhưng vẫn <b class="text-emerald-600">ĐỦ</b> dùng (Tích cực).</li><li>• <span class="text-rose-600 font-bold bg-rose-100 px-1 rounded">LITTLE</span> (Rất ít): Quá ít, <b class="text-rose-600">HẦU NHƯ KHÔNG CÓ</b> đủ (Tiêu cực).</li></ul></div></div><p class="text-sm bg-yellow-50 text-yellow-800 p-2 border border-yellow-300 rounded font-bold">💡 Mẹo: Có "a" (a few / a little) thì là "có một chút" (Tích cực/Đủ). Không có "a" (few / little) thì là "không có gì cả" (Tiêu cực/Thiếu).</p></div>` },
        { type: "pronunciation", title: "IV. Pronunciation", content: `<div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm text-center note-box-print"><div class="font-bold text-3xl text-indigo-600 mb-2">/t/</div><p class="text-sm text-slate-500 mb-4">Âm vô thanh</p><div class="text-slate-800 font-bold audio-row p-2" onclick="window.playAudio('town, tent, mountain', 'en-US')"><span class="text-indigo-600">t</span>own, <span class="text-indigo-600">t</span>ent, moun<span class="text-indigo-600">t</span>ain</div></div><div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm text-center note-box-print"><div class="font-bold text-3xl text-rose-500 mb-2">/d/</div><p class="text-sm text-slate-500 mb-4">Âm hữu thanh</p><div class="text-slate-800 font-bold audio-row p-2" onclick="window.playAudio('desert, island, wonder', 'en-US')"><span class="text-rose-500">d</span>esert, islan<span class="text-rose-500">d</span>, won<span class="text-rose-500">d</span>er</div></div></div>` },
        { type: "listening", title: "V. Dialogue & Role-play", lines: [{ c: "Vy", a: "👩🏻", t: "Phong, we are going to Fansipan mountain this weekend. What should we bring?", loc: "en-US", gender: "female" }, { c: "Phong", a: "👦🏻", t: "We must bring a sleeping bag. It is very cold at night.", loc: "en-GB", gender: "male" }, { c: "Vy", a: "👩🏻", t: "Good idea. Do we need to bring suncream?", loc: "en-US", gender: "female" }, { c: "Phong", a: "👦🏻", t: "Yes. The sun is strong during the day. We also must bring a compass to avoid getting lost.", loc: "en-GB", gender: "male" }, { c: "Vy", a: "👩🏻", t: "Okay. And what about painkillers and plasters?", loc: "en-US", gender: "female" }, { c: "Phong", a: "👦🏻", t: "They are essential! We must pack them in the backpack. Oh, remember, we mustn't litter in the forest.", loc: "en-GB", gender: "male" }, { c: "Vy", a: "👩🏻", t: "Of course. We must protect nature. I am so excited about the trip!", loc: "en-US", gender: "female" }] },
        { type: "speaking", title: "VI. Speaking", topic: "Topic: Talk about a natural wonder you know", prompts: ["1. What is the name of the wonder? Where is it? (Tên kỳ quan là gì? Ở đâu?)", "2. What is special about it? (cave, island, waterfall...)", "3. What must tourists do when visiting there?", "4. What mustn't tourists do?"], sample: "I want to talk about Ha Long Bay. It is a famous natural wonder in Quang Ninh province. It has many beautiful islands and amazing caves. When you visit Ha Long Bay, you must take a boat trip to see the islands. You also must listen to the tour guide. However, you mustn't throw trash into the sea to protect the environment." },
        { type: "listening_task", title: "VII. Listening Comprehension", audioScript: "Welcome to Son Doong Cave, the largest cave in the world. Before we start our tour, please listen to some important rules. First, you must wear strong boots because the path is very difficult. You must bring a flashlight to see in the dark. It is very beautiful inside, but you mustn't touch the stalactites (thạch nhũ) because it can destroy them. Finally, you mustn't leave the group. You must follow your tour guide at all times. Let's have an amazing trip!", questions: [{ id: "u5_lt1", q: "1. What is Son Doong?", opts: ["A. The highest mountain", "B. The largest cave", "C. A beautiful waterfall"], ans: 1 }, { id: "u5_lt2", q: "2. What MUST tourists wear?", opts: ["A. A uniform", "B. Strong boots", "C. Sandals"], ans: 1 }, { id: "u5_lt3", q: "3. What MUSTN'T tourists do?", opts: ["A. Bring a flashlight", "B. Follow the guide", "C. Touch the stalactites"], ans: 2 }, { id: "u5_lt4", q: "4. What must tourists do at all times?", opts: ["A. Take photos", "B. Follow the tour guide", "C. Leave the group"], ans: 1 }] },
        { type: "practice", title: "VIII. Practice", exercises: [{ id: 'u5_p1', type: 'grammar', q: "1. Hurry up! We have very _______ time left.", opts: ["A. little", "B. a little", "C. a few"], ans: 0, exp: "Time KHÔNG đếm được -> loại 'a few'. Rất ít, không đủ (tiêu cực) -> 'little'." }, { id: 'u5_p2', type: 'grammar', q: "2. You _______ drive fast in the school zone.", opts: ["A. must", "B. mustn't", "C. don't have to"], ans: 1, exp: "Mang tính chất cấm đoán -> Mustn't." }, { id: 'u5_p3', type: 'choice', q: "3. We need a _______ to sleep in the tent.", opts: ["A. compass", "B. backpack", "C. sleeping bag"], ans: 2, exp: "Sleeping bag: túi ngủ." }, { id: 'u5_p4', type: 'grammar', q: "4. How _______ water do you drink every day?", opts: ["A. many", "B. much", "C. little"], ans: 1, exp: "Water là danh từ không đếm được -> How much." }, { id: 'u5_p5', type: 'grammar', q: "5. I have _______ good friends at the new school.", opts: ["A. a little", "B. a few", "C. few"], ans: 1, exp: "Friends đếm được. Nghĩa tích cực (có vài người bạn tốt) -> a few." }] }
    ]

        window.showCustomAlert = function(title, message, icon="🔔") {
            document.getElementById('alertIcon').innerText = icon;
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerText = message;
            document.getElementById('customAlert').classList.add('active');
        }
        window.closeCustomAlert = function() { document.getElementById('customAlert').classList.remove('active'); }

         /* TẢI DỮ LIỆU LỚP HỌC NGAY KHI ĐĂNG NHẬP */
        window.preloadAdminData = async function() {
            try {
                // Tải danh sách lớp
                const classSnap = await window.fGetDocs(window.fCollection(window.fdb, "classes"));
                window.adminClassesData = [];
                classSnap.forEach(doc => { window.adminClassesData.push({id: doc.id, ...doc.data()}) });

                // Tải danh sách học sinh
                const userSnap = await window.fGetDocs(window.fCollection(window.fdb, "users"));
                let users = [];
                userSnap.forEach(doc => { let d = doc.data(); d.id = doc.id; users.push(d); });
                window.adminUsersData = users;
            } catch(e) { console.error("Lỗi preload data:", e); }
        }

        window.renderDashboardMenu = function() {
            const menu = document.getElementById('nav-menu');
            let dashHTML = `<p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-6 px-2">DASHBOARD</p>`;
            dashHTML += `<button onclick="window.showMyProgress()" id="nav-progress" class="module-nav-btn bg-sky-50 text-sky-700 border border-sky-200">📈 My Progress</button>`;
            dashHTML += `<button onclick="window.showLeaderboard()" id="nav-leaderboard" class="module-nav-btn bg-amber-50 text-amber-700 border border-amber-200 mt-2">🏆 Leaderboard</button>`;
            
            if (window.isAdmin) {
                dashHTML += `
                    <div class="mt-6 mb-2 px-2 bg-indigo-50/50 py-3 rounded-xl border border-indigo-100">
                        <p class="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2">CLASS MANAGEMENT</p>
                        <select id="sidebar-class-filter" onchange="window.showClassManagement(this.value)" class="w-full p-2.5 bg-white border border-indigo-200 rounded-lg text-sm font-bold text-indigo-700 outline-none cursor-pointer shadow-sm">
                            <option value="">Loading classes...</option>
                        </select>
                        <button onclick="window.showClassManagement('all')" id="nav-admin" class="w-full mt-3 module-nav-btn !mb-0 bg-indigo-600 text-white border-2 border-indigo-700 shadow-md hover:bg-indigo-700 text-center flex justify-center">👨‍🏫 Manage Users</button>
                    </div>
                `;
            }
            if(!menu.innerHTML.includes('DASHBOARD')) menu.innerHTML += dashHTML;
        }

            const menu = document.getElementById('nav-menu');
            menu.innerHTML = '';
            let lessonsHTML = '<p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-2 px-2">LESSONS</p>';
            let testsHTML = '<p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-6 px-2">EXAMS</p>';
            let sbtHTML = '<p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-6 px-2">WORKBOOK (SBT)</p>';
            
            if(window.database[window.currentClass]) {
                window.database[window.currentClass].modules.forEach(mod => {
                    let btn = `<button onclick="window.loadModule('${mod.id}')" id="nav-${mod.id}" class="module-nav-btn`;
                    if(mod.type === 'lesson') lessonsHTML += `${btn}">📖 ${mod.title}</button>`;
                    else if(mod.type === 'exam_module') testsHTML += `${btn} exam-btn">📝 ${mod.title}</button>`;
                    else if(mod.type === 'sbt_module') sbtHTML += `${btn} sbt-btn">📙 ${mod.title}</button>`;

        window.toggleMenu = function() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        window.changeClass = function() {
            window.currentClass = document.getElementById('class-selector').value;
            window.renderMenu();
            if(window.database[window.currentClass].modules.length > 0) window.loadModule(window.database[window.currentClass].modules[0].id);
        }

        window.loadModule = async function(moduleId) {
            if (window.innerWidth < 1024) window.toggleMenu(); 
            
            const mod = window.database[window.currentClass].modules.find(m => m.id === moduleId);
            if (!mod) return;

            window.currentModule = mod;
            document.querySelectorAll('.module-nav-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById('nav-' + moduleId)) document.getElementById('nav-' + moduleId).classList.add('active');
            
            document.getElementById('header-title').innerText = mod.title;
            const printClassTitle = document.getElementById('print-class-title');
            if (printClassTitle) printClassTitle.innerText = window.database[window.currentClass].name;
            const printModuleTitle = document.getElementById('print-module-title');
            if (printModuleTitle) printModuleTitle.innerText = mod.title;
            
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `<div class="text-center py-10 font-bold text-slate-500">Loading data...</div>`;
            
            const sourceNotice = document.getElementById('sbt-source-notice');
            if (sourceNotice) {
                if (mod.type === 'sbt_module') sourceNotice.classList.remove('hidden');
                else sourceNotice.classList.add('hidden');
            }

            if(window.currentExam && window.currentExam.timer) clearInterval(window.currentExam.timer);
            
            let isExamSecure = mod.type === 'exam_module' && mod.id !== 'rev1';
            let isUnit5Secure = mod.id === 'u5';
            
            if ((isExamSecure || isUnit5Secure) && !window.currentUser) {
                contentArea.innerHTML = `
                    <div class="glass-card text-center py-16 border-t-4 border-rose-500">
                        <div class="text-6xl mb-4">🔒</div>
                        <h2 class="text-2xl font-bold text-slate-800 baloo-font mb-2">Login Required</h2>
                        <p class="text-slate-600 mb-6 font-medium">You need to sign in with an authorized account to view this content.</p>
                        <button onclick="window.loginWithGoogle()" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-indigo-700 shadow-md">
                            Sign in now
                        </button>
                    </div>`;
                return;
            }

            if (mod.type === 'lesson') window.renderLessonView(mod, contentArea);
            else if (mod.type === 'exam_module') {
                if(window.renderExamSetupView) window.renderExamSetupView(mod, contentArea);
            }
            else if (mod.type === 'sbt_module') {
                window.sbtShowAll = window.isAdmin ? true : false; 
                window.currentAssignedExercises = [];

                if (window.currentUser) {
                    let targetClassId = window.currentUser.classId || 'unassigned';
                    let hasAssigned = false;

                    try {
                        if (!window.isAdmin) {
                            let studentDocSnap = await window.fGetDoc(window.fDoc(window.fdb, "assignments", `student_${window.currentUser.uid}_${mod.id}`));
                            if (studentDocSnap.exists() && studentDocSnap.data().assignedExercises) {
                                window.currentAssignedExercises = studentDocSnap.data().assignedExercises;
                                hasAssigned = true;
                            }
                        }
                        
                        if (!hasAssigned) {
                            let classDocSnap = await window.fGetDoc(window.fDoc(window.fdb, "assignments", `${targetClassId}_${mod.id}`));
                            if (classDocSnap.exists() && classDocSnap.data().assignedExercises) {
                                window.currentAssignedExercises = classDocSnap.data().assignedExercises;
                                hasAssigned = true;
                            }
                        }

                        if (!hasAssigned) {
                            window.currentAssignedExercises = mod.exercises.map(e => e.id);
                        }
                    } catch(e) { 
                        console.warn("Fetch assignment error, fallback to all.", e);
                        window.currentAssignedExercises = mod.exercises.map(e => e.id);
                    }
                } else {
                    window.currentAssignedExercises = mod.exercises.map(e => e.id);
                }
                
                window.renderSBTView(mod, contentArea);
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.startExam = function(modId) {
            const mod = window.currentModule;
            
            // FIX LỖI TRY AGAIN: Kiểm tra xem thẻ select có còn trên màn hình không
            const testSelector = document.getElementById('exam-test-selector');
            const levelSelector = document.getElementById('exam-level-selector');
            
            // Nếu có thẻ select thì lấy giá trị mới, nếu không thì lấy giá trị của bài thi trước đó
            const testId = testSelector ? testSelector.value : window.currentExam.testId;
            const level = levelSelector ? levelSelector.value : window.currentExam.level;
            
            let examKey = modId + "_" + testId + "_" + level;
            if(!window.examAttempts[examKey]) window.examAttempts[examKey] = 0;

            window.currentExam = {
                testId: testId,
                level: level,
                questions: mod.tests[testId].levels[level],
                answers: {},
                flagged: {},
                timeLeft: 45 * 60,
                startTime: Date.now(),
                examKey: examKey
            };

            const testData = mod.tests[testId];
            
            let teacherToolbarHtml = '';
            if (window.isAdmin) {
                teacherToolbarHtml = `

                </div>
                
                <div class="flex flex-col lg:flex-row gap-6 relative">
                    <div class="flex-1 space-y-6">`;
            
            if (testData.readingText) {
                html += `
                    <div class="glass-card bg-amber-50 border-amber-200 mt-8 mb-6 p-5">

            let currentPart = "";
            window.currentExam.questions.forEach((q, idx) => {
                if (q.part !== currentPart) {
                    html += `<h3 class="font-bold text-slate-500 uppercase tracking-wider mt-8 border-b-2 border-slate-200 pb-2">${q.part}</h3>`;
                    currentPart = q.part;
                }

                html += `<div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm scroll-mt-24 relative" id="exam-q-${idx}">
                            <div class="flex justify-between items-start mb-4 gap-4">
                                <p class="font-bold text-slate-800 text-[15px]"><span class="text-indigo-600">Q${idx+1}.</span> ${q.q}</p>
                                <button onclick="window.toggleExamFlag(${idx})" id="flag-btn-${idx}" class="shrink-0 text-slate-300 hover:text-rose-500 transition-colors p-2 rounded-lg hover:bg-rose-50 bg-slate-50 border border-slate-200 no-print" title="Flag for review">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"></path></svg>
                                </button>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="exam-opts-${idx}">`;
                q.opts.forEach((opt, oIdx) => {
                    html += `<div onclick="window.selectExamChoice(this, ${idx}, ${oIdx})" class="q-btn bg-slate-50 border border-slate-300 p-3 rounded-lg text-sm font-medium hover:bg-indigo-50">${opt}</div>`;
                });
                html += `</div>
                         <div id="exam-exp-${idx}" class="hidden mt-4 p-3 bg-amber-50 text-amber-800 text-sm rounded-lg border border-amber-200"><b>💡 Explanation:</b> ${q.exp}</div>
