<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Success 6 - Interactive English</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow: hidden; }
        h1, h2, h3, .baloo-font { font-family: 'Baloo 2', cursive; }
        
        .scroll-container { height: calc(100vh - 110px); overflow-y: auto; scroll-behavior: smooth; padding-bottom: 80px; }
        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .glass-card { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; padding: 24px; margin-bottom: 24px; }
        
        .audio-row { cursor: pointer; transition: all 0.2s; border: 2px solid transparent; border-radius: 12px; }
        .audio-row:hover { background-color: #f8fafc; border-color: #cbd5e1; transform: translateX(4px); }
        .active-audio { background-color: #fef08a !important; border-color: #eab308 !important; }
        
        .q-btn { transition: all 0.2s; cursor: pointer; }
        .q-selected { background-color: #e0e7ff !important; border-color: #4f46e5 !important; color: #3730a3 !important; font-weight: bold; border-width: 2px;}
        .q-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: bold;}
        .q-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; text-decoration: line-through;}
        .disabled { pointer-events: none; opacity: 0.9;}

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #e2e8f0; text-align: left;}
        th { background-color: #f8fafc; font-weight: 700; }

        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background-color: white; z-index: 100; transition: left 0.3s ease-in-out; box-shadow: 4px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 90; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .sidebar-overlay.open { display: block; opacity: 1; }
        
        .module-nav-btn { width: 100%; text-align: left; padding: 12px 16px; border-radius: 12px; font-weight: 600; color: #475569; transition: all 0.2s; margin-bottom: 8px;}
        .module-nav-btn:hover { background-color: #f1f5f9; }
        .module-nav-btn.active { background-color: #e0e7ff; color: #4338ca; border-left: 4px solid #4f46e5; }
        .module-nav-btn.exam-btn { border: 1px solid #fecdd3; background-color: #fff1f2; color: #be123c; }
        .module-nav-btn.exam-btn:hover { background-color: #ffe4e6; }
        .module-nav-btn.exam-btn.active { background-color: #fecdd3; color: #9f1239; border-left: 4px solid #e11d48; }

        .custom-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 1000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s; backdrop-filter: blur(2px);}
        .custom-alert-overlay.active { display: flex; opacity: 1;}
        .custom-alert-box { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: scale(0.9); transition: transform 0.2s;}
        .custom-alert-overlay.active .custom-alert-box { transform: scale(1);}

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: A4 portrait; margin: 18mm 15mm 20mm 15mm; } 
            
            body { background: white !important; font-size: 11.5pt !important; font-family: 'Georgia', 'Times New Roman', serif !important; color: #111 !important; line-height: 1.5 !important; overflow: visible !important; }
            .scroll-container { height: auto !important; overflow: visible !important; padding: 0 !important; }
            
            .no-print, header, .sidebar, .sidebar-overlay, #action-buttons, #exam-action-buttons, .audio-row:hover, .glass-card > p.text-xs.font-bold, #listening-action-buttons { display: none !important; }
            
            #content-area { padding: 0 !important; max-width: 100% !important; }
            .glass-card { box-shadow: none !important; border: none !important; border-radius: 0 !important; padding: 0 !important; margin-bottom: 18pt !important; background: transparent !important; page-break-inside: auto !important; }
            section { page-break-inside: auto !important; margin-bottom: 15pt !important; }
            
            .unit-header-print { text-align: right; border-bottom: 3px solid #4f46e5; padding-bottom: 10px; margin-bottom: 25px; }
            .unit-header-print h1 { font-family: 'Arial', sans-serif !important; font-size: 24pt !important; font-weight: 900 !important; color: #4f46e5 !important; margin: 0; text-transform: uppercase; }
            .unit-header-print h2 { font-family: 'Arial', sans-serif !important; font-size: 12pt !important; font-weight: normal !important; color: #64748b !important; margin: 5px 0 0 0; letter-spacing: 2px; text-transform: uppercase; }

            h2.baloo-font { font-family: 'Arial', sans-serif !important; font-size: 14pt !important; color: #ffffff !important; background-color: #4f46e5 !important; padding: 6px 12px !important; border-radius: 6px !important; margin: 20pt 0 10pt 0 !important; font-weight: bold !important; text-transform: uppercase; display: inline-block; page-break-after: avoid !important; }
            h3 { font-family: 'Arial', sans-serif !important; font-size: 12pt !important; font-weight: bold !important; margin-bottom: 8pt !important; page-break-after: avoid !important; color: #1e3a8a !important;}
            
            .vocab-item-print, table, .exercise-item { page-break-inside: avoid !important; }
            
            .print-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12pt !important; }
            .vocab-item-print { border: 1px solid #e2e8f0 !important; padding: 10pt !important; border-radius: 8px !important; background: #f8fafc !important; border-left: 4px solid #4f46e5 !important;}
            
            table { width: 100% !important; border-collapse: collapse !important; margin-bottom: 12pt !important; }
            th, td { border: 1px solid #cbd5e1 !important; padding: 8pt !important; font-family: 'Arial', sans-serif !important; font-size: 10.5pt !important;}
            th { background-color: #e2e8f0 !important; color: #0f172a !important;}
            .note-box-print { background: #f0fdf4 !important; border: 1px solid #bbf7d0 !important; padding: 12pt !important; margin-bottom: 12pt !important; border-radius: 8px !important; }

            .audio-row { border: none !important; padding: 0 !important; display: block !important; margin-bottom: 8pt !important;}
            .chat-avatar { display: none !important; } 
            .chat-left, .chat-right, .p-3.rounded-2xl { display: inline !important; background: transparent !important; border: none !important; padding: 0 !important; box-shadow: none !important; max-width: 100% !important; color: #1e293b !important; font-family: 'Georgia', serif !important; font-size: 11.5pt !important;}
            .text-right { text-align: left !important; }
            .flex-row-reverse { flex-direction: row !important; }
            .chat-name-print { font-weight: bold !important; color: #4f46e5 !important; display: inline-block !important; min-width: 75px !important; font-family: 'Arial', sans-serif !important;}
            
            .exercise-item { margin-bottom: 12pt !important; }
            .q-btn { display: inline-block !important; border: none !important; padding: 0 !important; margin-right: 18pt !important; background: transparent !important; font-family: 'Arial', sans-serif !important;}
            
            .body-parts-visual { border: 1px solid #cbd5e1 !important; border-radius: 8px !important; padding: 15pt !important; background: #f8fafc !important; }
        }
    </style>
</head>
<body>

        <footer class="bg-slate-800 text-white text-center py-2.5 text-sm font-bold no-print z-50 shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.1)] border-t border-slate-700 tracking-wide">
            Giáo án điện tử bởi Mr. Khoa - Zalo: 0901-637-827
        </footer>
    </div>

    <script>
        const database = {
            "class-6": {
                name: "English 6",
                modules: [
                    // ==========================================
                    // UNIT 1: MY NEW SCHOOL
                    // ==========================================
                    {
                        id: "u1",
                        type: "lesson",
                        title: "Unit 1: My New School",
                        sections: [
                            {
                                type: "objectives", title: "I. Objectives",
                                content: `<ul class="list-disc pl-5 text-slate-700 space-y-2"><li><b>Vocabulary:</b> School things and activities.</li><li><b>Grammar:</b> Present Simple vs Present Continuous.</li><li><b>Pronunciation:</b> Sounds /ɑː/ and /ʌ/.</li></ul>`
                            },
                            {
                                type: "vocab", title: "II. Vocabulary",
                                words: [
                                    { w: "boarding school", p: "/ˈbɔː.dɪŋ ˌskuːl/", m: "Trường nội trú" },
                                    { w: "international school", p: "/ˌɪn.təˈnæʃ.ən.əl skuːl/", m: "Trường quốc tế" },
                                    { w: "equipment", p: "/ɪˈkwɪp.mənt/", m: "Thiết bị (Uncountable/Không đếm được)" },
                                    { w: "compass", p: "/ˈkʌm.pəs/", m: "Compa" },
                                    { w: "calculator", p: "/ˈkæl.kjə.leɪ.tər/", m: "Máy tính bỏ túi" },
                                    { w: "uniform", p: "/ˈjuː.nɪ.fɔːm/", m: "Đồng phục" },
                                    { w: "rubber", p: "/ˈrʌb.ər/", m: "Cục tẩy" },
                                    { w: "backpack", p: "/ˈbæk.pæk/", m: "Ba lô" }
                                ],
                                collocations: [
                                    { word: "PLAY", items: "football, sports, games" },
                                    { word: "DO", items: "homework, judo, exercise" },
                                    { word: "HAVE", items: "lunch, a lesson, a uniform" },
                                    { word: "STUDY", items: "English, maths, science" }
                                ]
                            },
                            {
                                type: "grammar", title: "III. Grammar",
                                content: `<div class="glass-card note-box-print border-l-4 border-l-emerald-500 mb-6"><h3 class="font-bold text-lg text-emerald-800 mb-2 print:text-black">1. Present Simple (Thì Hiện Tại Đơn)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage (Cách dùng):</b><br>• Diễn tả thói quen, hành động lặp đi lặp lại (Habits, routines).<br>• Diễn tả sự thật hiển nhiên, chân lý (General truths).<br>• Diễn tả lịch trình, thời gian biểu cố định của tàu xe, phim ảnh (Timetables).</div><table class="mb-4 bg-white text-sm w-full"><tr><th class="w-1/4 bg-emerald-50 text-emerald-800">(+) Affirmative</th><td><b>I/You/We/They + V</b> <br> <b>He/She/It + V(s/es)</b></td></tr><tr><th class="bg-rose-50 text-rose-800">(-) Negative</th><td>S + <b>don't / doesn't</b> + V(infinitive/nguyên mẫu)</td></tr><tr><th class="bg-amber-50 text-amber-800">(?) Interrogative</th><td><b>Do / Does</b> + S + V(infinitive/nguyên mẫu)?</td></tr></table><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-rose-50 border border-rose-200 p-4 rounded-xl w-full"><h4 class="font-bold text-rose-800 text-sm mb-2 print:text-black">📝 Adding -s / -es (Quy tắc thêm s/es)</h4><ul class="text-sm space-y-1"><li>• End in <b class="text-rose-600 print:text-black">o, s, x, z, ch, sh</b> ➔ add <b>-es</b> (go ➔ goes)</li><li>• Consonant + <b class="text-rose-600 print:text-black">y</b> ➔ change to <b>-ies</b> (study ➔ studies)</li><li>• Others ➔ add <b>-s</b> (play ➔ plays)</li></ul></div><div class="bg-amber-50 border border-amber-200 p-4 rounded-xl w-full"><h4 class="font-bold text-amber-800 text-sm mb-2 print:text-black">⏳ Adverbs of Frequency (Trạng từ tần suất)</h4><p class="text-sm"><i>always, usually, often, sometimes, never</i></p><p class="text-sm mt-1">• <b>Before normal verbs:</b> I <i>always get</i> up early.</p><p class="text-sm">• <b>After To-Be:</b> He <i>is usually</i> late.</p></div></div></div><div class="glass-card note-box-print border-l-4 border-l-blue-500 mb-6"><h3 class="font-bold text-lg text-blue-800 mb-2 print:text-black">2. Present Continuous (Thì Hiện Tại Tiếp Diễn)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage (Cách dùng):</b><br>• Diễn tả hành động đang xảy ra ngay lúc nói (Happening right now).<br>• Diễn tả một kế hoạch chắc chắn sẽ xảy ra trong tương lai gần (Future arrangements).</div><table class="mb-4 bg-white text-sm w-full"><tr><th class="w-1/4 bg-blue-50 text-blue-800">(+) Affirmative</th><td>S + <b>am/is/are + V-ing</b></td></tr><tr><th class="bg-rose-50 text-rose-800">(-) Negative</th><td>S + <b>am/is/are + NOT + V-ing</b></td></tr><tr><th class="bg-amber-50 text-amber-800">(?) Interrogative</th><td><b>Am/Is/Are</b> + S + <b>V-ing?</b></td></tr></table><div class="bg-cyan-50 border border-cyan-200 p-4 rounded-xl text-sm"><h4 class="font-bold text-cyan-800 mb-2 print:text-black">📝 Adding -ing (Quy tắc thêm -ing):</h4><p>• Remove "e" ➔ add "-ing" (make ➔ making) <br> • 1 vowel between 2 consonants ➔ <b>Double last consonant</b> (run ➔ running).</p></div></div><div class="glass-card note-box-print border-t-4 border-t-purple-500 bg-purple-50/30"><h3 class="font-bold text-lg text-purple-800 mb-2 print:text-black">💡 Distinction (Phân Biệt Nhanh Để Làm Bài Thi)</h3><table class="w-full text-sm bg-white border border-slate-200 shadow-sm"><tr><th class="w-1/2 bg-emerald-100 text-emerald-800 p-3 border-r">Present Simple (HT Đơn)</th><th class="w-1/2 bg-blue-100 text-blue-800 p-3">Present Continuous (HT Tiếp Diễn)</th></tr><tr><td class="p-3 align-top border-r"><b>Dấu hiệu:</b> always, usually, often, sometimes, never, every (day/week)...<br><b>Ví dụ:</b> I <i>play</i> football every Sunday.</td><td class="p-3 align-top"><b>Dấu hiệu:</b> now, right now, at present, at the moment, Look!, Listen!...<br><b>Ví dụ:</b> Look! They <i>are playing</i> football now.</td></tr></table></div>`
                            },
                            {
                                type: "pronunciation", title: "IV. Pronunciation",
                                content: `<div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm text-center note-box-print"><div class="font-bold text-3xl text-indigo-600 mb-2">/ɑː/</div><p class="text-sm text-slate-500 mb-4">Long sound, open your mouth wide. (Âm a dài)</p><div class="text-slate-800 font-bold audio-row p-2" onclick="playAudio('${encodeURIComponent('smart, art, class')}', 'en-US')">sm<span class="text-indigo-600">ar</span>t, <span class="text-indigo-600">ar</span>t, cl<span class="text-indigo-600">a</span>ss</div></div><div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm text-center note-box-print"><div class="font-bold text-3xl text-rose-500 mb-2">/ʌ/</div><p class="text-sm text-slate-500 mb-4">Short, quick sound. (Âm á ngắn)</p><div class="text-slate-800 font-bold audio-row p-2" onclick="playAudio('${encodeURIComponent('subject, study, compass')}', 'en-US')">s<span class="text-rose-500">u</span>bject, st<span class="text-rose-500">u</span>dy, c<span class="text-rose-500">o</span>mpass</div></div></div>`
                            },
                            {
                                type: "listening", title: "V. Listening & Role-play",
                                lines: [
                                    { c: "Emma", a: "👩🏻", t: "Hi Alex! Are you ready for our first day at the new school? You look smart in your uniform!", loc: "en-US", gender: "female" },
                                    { c: "Alex", a: "👦🏻", t: "Thanks, Emma! I am putting on my backpack. Oh, look! Ben is coming.", loc: "en-US", gender: "male" },
                                    { c: "Emma", a: "👩🏻", t: "He is carrying a heavy backpack.", loc: "en-US", gender: "female" },
                                    { c: "Ben", a: "👦🏼", t: "Good morning guys! I always pack my school bag carefully. Do you have your compass and calculator?", loc: "en-US", gender: "male" },
                                    { c: "Alex", a: "👦🏻", t: "Yes, I do. I heard our school has modern equipment.", loc: "en-US", gender: "male" },
                                    { c: "Ben", a: "👦🏼", t: "That's right! We can play football and do judo after lessons.", loc: "en-US", gender: "male" },
                                    { c: "Emma", a: "👩🏻", t: "Awesome! By the way, my cousin studies at a boarding school. He only goes home on weekends.", loc: "en-US", gender: "female" },
                                    { c: "Alex", a: "👦🏻", t: "Really? Let's go now, we have an English lesson.", loc: "en-US", gender: "male" }
                                ],
                                questions: [
                                    { id: "l1", q: "1. What is Ben carrying?", opts: ["A. A compass", "B. A heavy backpack", "C. A new uniform"], ans: 1 },
                                    { id: "l2", q: "2. What can they do after lessons?", opts: ["A. Go home", "B. Study at a boarding school", "C. Play football and do judo"], ans: 2 },
                                    { id: "l3", q: "3. Who studies at a boarding school?", opts: ["A. Emma's cousin", "B. Ben's sister", "C. Alex"], ans: 0 }
                                ]
                            },
                            {
                                type: "speaking", title: "VI. Speaking", topic: "Topic: Describe your new school",
                                prompts: [
                                    "1. General: What is the name of your school? Is it a boarding or international school?",
                                    "2. Equipment: What equipment does it have? (e.g., smart boards, modern computer room, library)",
                                    "3. Activities: What do you always/usually do at break time or after lessons? (e.g., play football, do judo)",
                                    "4. Uniform: Do you wear a uniform every day?"
                                ],
                                sample: "Hello everyone. My name is Nam. I study at Global Secondary School. It is very big. My school has modern equipment like smart boards and a large library. I usually wear my uniform on Mondays and Thursdays. At break time, I always play football with my friends in the schoolyard. Sometimes, I do judo in the gym after lessons. I love my new school very much!"
                            },
                            {
                                type: "listening_task", title: "VII. Listening Comprehension",
                                audioScript: "Hello, my name is Minh. I am very happy today because it is my first day at Global International School. My school is very large and it has modern equipment. Look! Some students are playing football in the playground. I always wear my new uniform on Mondays and Wednesdays. Right now, I am standing in the library. I have my compass, calculator, and a notebook in my backpack. I am waiting for my new friends. We are studying maths next.",
                                questions: [
                                    { id: "u1_lt1", q: "1. What kind of school does Minh go to?", opts: ["A. A boarding school", "B. An international school", "C. A small school"], ans: 1 },
                                    { id: "u1_lt2", q: "2. What are some students doing in the playground?", opts: ["A. Playing football", "B. Doing judo", "C. Studying maths"], ans: 0 },
                                    { id: "u1_lt3", q: "3. How often does Minh wear his uniform?", opts: ["A. Every day", "B. On Mondays and Wednesdays", "C. Only on Mondays"], ans: 1 },
                                    { id: "u1_lt4", q: "4. True or False: Minh is waiting for his parents in the library.", opts: ["A. True", "B. False"], ans: 1 }
                                ]
                            },
                            {
                                type: "reading_practice", title: "VIII. Reading & Practice",
                                readingText: "In many countries, janitors clean the schools. But in Japan, students clean their own classrooms. This activity is called <b>Osoji</b>. Every day after classes, students put away their books, sweep the floor, and clean the desks. They usually spend 15 minutes doing this. Teachers also join the students. Osoji teaches students to respect their school and work together as a team.",

            if(database[currentClass].modules.length > 0) {
                loadModule(database[currentClass].modules[0].id);
            }

            menu.innerHTML = '<p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-2 px-2">LESSONS & EXAMS</p>';
            
            database[currentClass].modules.forEach(mod => {

                    html = `<button onclick="loadModule('${mod.id}')" id="nav-${mod.id}" class="module-nav-btn">📖 ${mod.title}</button>`;

                    html = `<button onclick="loadModule('${mod.id}')" id="nav-${mod.id}" class="module-nav-btn exam-btn mt-4">📝 ${mod.title}</button>`;
                }
                menu.innerHTML += html;
            });
        }

            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function changeClass() {
            currentClass = document.getElementById('class-selector').value;
            renderMenu();
            if(database[currentClass].modules.length > 0) {
                loadModule(database[currentClass].modules[0].id);
            }
        }

        function loadModule(moduleId) {
            if (window.innerWidth < 1024) toggleMenu(); 
            
            const mod = database[currentClass].modules.find(m => m.id === moduleId);
            if (!mod) return;

            currentModule = mod;
            document.querySelectorAll('.module-nav-btn').forEach(b => b.classList.remove('active'));
            const navBtn = document.getElementById('nav-' + moduleId);
            if(navBtn) navBtn.classList.add('active');
            
            document.getElementById('header-title').innerText = mod.title;
            document.getElementById('print-class-title').innerText = database[currentClass].name;
            document.getElementById('print-module-title').innerText = mod.title;

            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '';
            
            // Clear exam timer if active
            if(currentExam.timer) clearInterval(currentExam.timer);
            
            if (mod.type === 'lesson') {
                renderLessonView(mod, contentArea);

                    <!-- RIGHT COLUMN: NAVIGATOR PANEL -->

                                <div class="flex items-center gap-1.5"><span class="w-4 h-4 rounded bg-rose-100 border-2 border-rose-500 text-rose-600 flex items-center justify-center font-bold">⚑</span> Flagged</div>

            `;

            document.getElementById('content-area').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            renderExamNavigator();

            if(currentExam.timer) clearInterval(currentExam.timer);
            currentExam.timer = setInterval(() => {
                currentExam.timeLeft--;
                let m = Math.floor(currentExam.timeLeft / 60);
                let s = currentExam.timeLeft % 60;
                document.getElementById('timer-countdown').innerText = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
                
                if (currentExam.timeLeft <= 0) {
                    clearInterval(currentExam.timer);
                    showCustomAlert("Time's up!", "45 minutes are over! The system has automatically submitted your exam.");
                    submitExam(true);
                }
            }, 1000);
        }

        function renderExamNavigator() {
            let navHtml = '';
            currentExam.questions.forEach((_, idx) => {
                navHtml += `<button onclick="document.getElementById('exam-q-${idx}').scrollIntoView({behavior: 'smooth', block: 'center'})" id="nav-btn-${idx}" class="w-full aspect-square rounded-lg border-2 border-rose-300 text-rose-500 bg-white flex items-center justify-center font-bold text-[15px] hover:scale-105 hover:bg-rose-50 transition-all shadow-sm">${idx + 1}</button>`;
            });
            document.getElementById('exam-navigator').innerHTML = navHtml;
        }

        function updateExamNavigator(idx) {
            let btn = document.getElementById('nav-btn-' + idx);
            if (!btn) return;
            
            let hasAnswer = currentExam.answers[idx] !== undefined;
            let isFlagged = currentExam.flagged[idx];

            // Reset base classes
            btn.className = "w-full aspect-square rounded-lg border-2 flex items-center justify-center font-bold text-[15px] hover:scale-105 transition-all shadow-sm cursor-pointer";

            if (isFlagged) {
                // Trạng thái cờ đỏ nổi bật
                btn.classList.add("bg-rose-100", "border-rose-500", "text-rose-600");
                btn.innerHTML = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"></path></svg>`;
            } else if (hasAnswer) {
                // Đã làm: Xanh lá
                btn.classList.add("bg-emerald-500", "border-emerald-600", "text-white");
                btn.innerHTML = idx + 1;
            } else {
                // Chưa làm: Viền đỏ nhạt
                btn.classList.add("bg-white", "border-rose-300", "text-rose-500", "hover:bg-rose-50");
                btn.innerHTML = idx + 1;
            }
        }

        function toggleExamFlag(idx) {
            currentExam.flagged[idx] = !currentExam.flagged[idx];
            let flagBtn = document.getElementById('flag-btn-' + idx);
            if(currentExam.flagged[idx]) {
                flagBtn.classList.remove('text-slate-300', 'bg-slate-50', 'border-slate-200');
                flagBtn.classList.add('text-rose-600', 'bg-rose-100', 'border-rose-300');
            } else {
                flagBtn.classList.add('text-slate-300', 'bg-slate-50', 'border-slate-200');
                flagBtn.classList.remove('text-rose-600', 'bg-rose-100', 'border-rose-300');
            }
            updateExamNavigator(idx);
        }

        function selectExamChoice(btn, qIdx, choiceIdx) {
            currentExam.answers[qIdx] = choiceIdx;
            const parent = document.getElementById('exam-opts-' + qIdx);
            parent.querySelectorAll('.q-btn').forEach(b => b.classList.remove('q-selected'));
            btn.classList.add('q-selected');
            
            // Tự động cập nhật bảng Navigator bên phải
            updateExamNavigator(qIdx);
        }

        function submitExam(isTimeout = false) {
            let unanswered = currentExam.questions.length - Object.keys(currentExam.answers).length;
            if(!isTimeout && unanswered > 0) {
                if(!confirm(`You have ${unanswered} unanswered questions! Are you sure you want to submit?`)) return;
            } else if (!isTimeout) {
                if(!confirm("Are you sure you want to submit your exam?")) return;
            }

            clearInterval(currentExam.timer);
            
            let score = 0;
            currentExam.questions.forEach((q, idx) => {
                let userAns = currentExam.answers[idx];
                let parent = document.getElementById('exam-opts-' + idx);
                let btns = parent.querySelectorAll('.q-btn');
                
                btns.forEach(b => b.classList.add('disabled'));

                if (userAns === q.ans) {
                    score++;
                    btns[userAns].style.backgroundColor = "#e0e7ff"; 
                    btns[userAns].style.borderColor = "#4f46e5";
                } else {
                    if (userAns !== undefined) {
                        btns[userAns].classList.remove('q-selected');
                        btns[userAns].classList.add('q-wrong'); 
                    }
                }
            });

            const actionContainer = document.getElementById('exam-action-buttons');
            let percentage = (score / currentExam.questions.length) * 10;
            let resultColor = percentage >= 8 ? "emerald" : (percentage >= 5 ? "amber" : "rose");

            actionContainer.innerHTML = `
                <div class="p-8 bg-white border-2 border-${resultColor}-500 rounded-2xl shadow-lg inline-block text-center w-full md:w-auto mb-6">
                    <h2 class="text-2xl font-bold text-slate-800 mb-2 baloo-font">EXAM RESULT</h2>
                    <div class="text-5xl font-extrabold text-${resultColor}-600 mb-2">${score} / ${currentExam.questions.length}</div>
                    <p class="text-slate-500 font-medium">Your score: ${percentage.toFixed(1)} / 10</p>
                </div>
                <div class="flex flex-col md:flex-row justify-center gap-4">
                    <button onclick="loadModule('${currentModule.id}')" class="bg-slate-600 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-slate-700 shadow-md transition-transform transform active:scale-95 w-full md:w-auto">
                        🔄 Try Again
                    </button>
                    <button onclick="explainExam()" class="bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-indigo-700 shadow-md transition-transform transform active:scale-95 w-full md:w-auto">
                        💡 Show Answers & Explanation
                    </button>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function explainExam() {
            document.getElementById('exam-audio-script').classList.remove('hidden');

            currentExam.questions.forEach((q, idx) => {
                let parent = document.getElementById('exam-opts-' + idx);
                let btns = parent.querySelectorAll('.q-btn');
                
                btns[q.ans].classList.remove('q-wrong'); 
                btns[q.ans].classList.add('q-correct');
                btns[q.ans].style.backgroundColor = ""; 
                btns[q.ans].style.borderColor = "";

                document.getElementById('exam-exp-' + idx).classList.remove('hidden');

                // Cập nhật lại màu sắc cho Navigator Panel để học sinh dễ soi lại câu sai
                let navBtn = document.getElementById('nav-btn-' + idx);
                if(navBtn) {
                    navBtn.className = "w-full aspect-square rounded-lg border-2 flex items-center justify-center font-bold text-[15px] transition-all shadow-sm cursor-pointer hover:scale-105";
                    if(currentExam.answers[idx] === q.ans) {
                        navBtn.classList.add("bg-emerald-100", "border-emerald-500", "text-emerald-700");
                    } else {
                        navBtn.classList.add("bg-rose-100", "border-rose-500", "text-rose-700");
                    }
                    navBtn.innerHTML = idx + 1; 
                }
            });
            
            showCustomAlert("Success", "Correct answers (green) and detailed explanations have been unlocked below each question!", "✅");
        }

        function toggleTranscript(btn) {
            const container = btn.closest('.glass-card');
            const el = container.querySelector('.audio-transcript');
            if(el.classList.contains('hidden')) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        function selectListeningChoice(btn, qId, choiceIdx) {
            userListeningAnswers[qId] = choiceIdx;
            const parent = document.getElementById('opts-' + qId);
            parent.querySelectorAll('.q-btn').forEach(b => b.classList.remove('q-selected'));
            btn.classList.add('q-selected');
        }

        function submitListeningTask(firstQid) {
            let score = 0;
            const section = currentModule.sections.find(s => s.type === 'listening_task');
            const questions = section.questions;

            questions.forEach(q => {
                const parent = document.getElementById('opts-' + q.id);
                const btns = parent.querySelectorAll('.q-btn');
                const userAns = userListeningAnswers[q.id];
                
                btns.forEach(b => b.classList.add('disabled'));

                if (userAns === q.ans) {
                    btns[userAns].classList.remove('q-selected', 'q-wrong');
                    btns[userAns].classList.add('q-correct');
                    score++;
                } else {
                    if (userAns !== undefined) {
                        btns[userAns].classList.remove('q-selected');
                        btns[userAns].classList.add('q-wrong');
                    }
                    btns[q.ans].classList.add('q-correct');
                }
            });

            const actionContainer = document.querySelector('.listening-action-buttons');
            actionContainer.innerHTML = `
                <div class="text-xl font-bold text-teal-600 mb-4 bg-teal-50 inline-block px-6 py-2 rounded-xl border border-teal-200">🎉 Score: ${score} / ${questions.length}</div>
                <br><button onclick="loadModule('${currentModule.id}')" class="bg-amber-500 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-amber-600 shadow-md transition-transform transform active:scale-95 text-base w-full md:w-auto">🔄 Try Again</button>
            `;
        }

        function selectListening(btn, qId, selectedIdx, ansIdx) {
            const parent = document.getElementById('opts-' + qId);
            parent.querySelectorAll('.q-btn').forEach(b => { b.classList.add('disabled'); b.classList.remove('q-selected');});
            const resultDiv = document.getElementById('res-' + qId);
            resultDiv.classList.remove('hidden');

            if(selectedIdx === ansIdx) {
                btn.classList.add('q-correct');
                resultDiv.innerText = "✅ Correct!";
                resultDiv.className = "mt-2 font-bold text-sm text-emerald-600";
            } else {
                btn.classList.add('q-wrong');
                parent.children[ansIdx].classList.add('q-correct');
                resultDiv.innerText = "❌ Incorrect. Listen again!";
                resultDiv.className = "mt-2 font-bold text-sm text-rose-600";
            }
        }

        function selectChoice(btn, exId, choiceIdx) {
            userAnswers[exId] = choiceIdx;
            const parent = document.getElementById('opts-' + exId);
            parent.querySelectorAll('.q-btn').forEach(b => b.classList.remove('q-selected'));
            btn.classList.add('q-selected');
        }

        function submitExercises() {
            let score = 0;
            const exercises = currentModule.sections.find(s => s.type === 'reading_practice').exercises;

            exercises.forEach(ex => {
                const expDiv = document.getElementById('exp-' + ex.id);
                expDiv.classList.remove('hidden');

                if (ex.type === 'choice' || ex.type === 'grammar') {
                    const parent = document.getElementById('opts-' + ex.id);
                    const btns = parent.querySelectorAll('.q-btn');
                    const userAns = userAnswers[ex.id];
                    btns.forEach(b => b.classList.add('disabled'));

                    if (userAns === ex.ans) {
                        btns[userAns].classList.remove('q-selected', 'q-wrong');
                        btns[userAns].classList.add('q-correct');
                        score++;
                    } else {
                        if (userAns !== undefined) {
                            btns[userAns].classList.remove('q-selected');
                            btns[userAns].classList.add('q-wrong');
                        }
                        btns[ex.ans].classList.add('q-correct');
                    }
                } else if (ex.type === 'fill') {
                    const input = document.getElementById('input-' + ex.id);
                    const val = input.value.trim().toLowerCase();
                    input.readOnly = true;
                    if (val === ex.ans) { input.classList.add('q-input-correct'); score++; } 
                    else {
                        input.classList.add('q-input-wrong');
                        expDiv.innerHTML = `<span class="text-rose-600 block mb-2 text-[15px]">❌ Đáp án đúng là: <b class="bg-rose-100 px-2 py-0.5 rounded">${ex.ans}</b></span>` + expDiv.innerHTML;
                    }
                }
            });

            const actionContainer = document.getElementById('action-buttons');
            actionContainer.innerHTML = `
                <div class="text-xl font-bold text-emerald-600 mb-4 bg-emerald-50 inline-block px-6 py-2 rounded-xl border border-emerald-200">🎉 Score: ${score} / ${exercises.length}</div>
                <br><button onclick="loadModule('${currentModule.id}')" class="bg-amber-500 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-amber-600 shadow-md transition-transform transform active:scale-95 text-base w-full md:w-auto">🔄 Try Again</button>
            `;
            actionContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        const synth = window.speechSynthesis;
        let availableVoices = [];

        function loadVoices() { availableVoices = synth.getVoices(); }
        if (typeof synth.onvoiceschanged !== 'undefined') { synth.onvoiceschanged = loadVoices; }
        loadVoices();

        function getVoiceByGender(gender, lang = 'en-US') {
            if (availableVoices.length === 0) availableVoices = synth.getVoices();
            const femaleKeywords = ['female', 'zira', 'samantha', 'victoria', 'karen', 'susan'];
            const maleKeywords = ['male', 'david', 'daniel', 'alex', 'george', 'mark'];
            let voice = null;
            if (gender === 'female') { voice = availableVoices.find(v => femaleKeywords.some(kw => v.name.toLowerCase().includes(kw))); } 
            else if (gender === 'male') { voice = availableVoices.find(v => maleKeywords.some(kw => v.name.toLowerCase().includes(kw))); }
            if (!voice) { voice = availableVoices.find(v => v.lang.startsWith('en')); }
            return voice;
        }

        function highlightAudioRow() {
            document.querySelectorAll('.audio-row').forEach(el => el.classList.remove('active-audio'));
            if(event && event.currentTarget && event.currentTarget.classList.contains('audio-row')) {
                event.currentTarget.classList.add('active-audio');
            }
        }
        function removeHighlight() { document.querySelectorAll('.audio-row').forEach(el => el.classList.remove('active-audio')); }

        function playAudio(encodedText, lang = 'en-US', pitch = 1) {
            highlightAudioRow();
            synth.cancel();
            let text = "";
            try { text = decodeURIComponent(encodedText); } catch(e) { text = encodedText; }
            
            let chunks = text.match(/[^.!?]+[.!?]+/g);
            if (!chunks || chunks.length === 0) chunks = [text];
            let currentChunk = 0;
            
            function speakNextChunk() {
                if (currentChunk >= chunks.length) { removeHighlight(); return; }
                let utterance = new SpeechSynthesisUtterance(chunks[currentChunk].trim());
                utterance.lang = lang; utterance.rate = 0.85; utterance.pitch = pitch;
                utterance.onend = () => { currentChunk++; speakNextChunk(); };
                utterance.onerror = () => removeHighlight();
                synth.speak(utterance);
            }
            speakNextChunk();
        }

        function playDialogueLine(encodedText, gender) {
            highlightAudioRow();
            synth.cancel();
            let text = "";
            try { text = decodeURIComponent(encodedText); } catch(e) { text = encodedText; }
            
            const utterance = new SpeechSynthesisUtterance(text);
            const voice = getVoiceByGender(gender, 'en-US');
            if(voice) utterance.voice = voice;
            utterance.lang = 'en-US'; utterance.rate = 0.85;
            utterance.onend = () => removeHighlight();
            utterance.onerror = () => removeHighlight();
            synth.speak(utterance);
        }
        
        function playSpeakingSample(encodedText) { playAudio(encodedText, 'en-US'); }
        function playReadingText(encodedText) { playAudio(encodedText, 'en-US'); }

        function playAllDialogue() {
            synth.cancel(); 
            const sec = currentModule.sections.find(s => s.type === 'listening');
            if(!sec) return;
            removeHighlight();
            showCustomAlert("Playing All", "Đang phát toàn bộ bài hội thoại. (Playing the full dialogue).", "▶️");
            let currentLine = 0;
            function speakNextLine() {
                if(currentLine >= sec.lines.length) return;
                let l = sec.lines[currentLine];
                let utterance = new SpeechSynthesisUtterance(l.t);
                const voice = getVoiceByGender(l.gender, l.loc || 'en-US');
                if(voice) utterance.voice = voice;
                utterance.lang = l.loc || 'en-US'; utterance.rate = 0.85;
                utterance.onend = () => { currentLine++; speakNextLine(); };
                synth.speak(utterance);
            }
            speakNextLine();
        }

        function showCustomAlert(title, message, icon="🔔") {
            document.getElementById('alertIcon').innerText = icon;
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerText = message;
            document.getElementById('customAlert').classList.add('active');
        }
        function closeCustomAlert() { document.getElementById('customAlert').classList.remove('active'); }

        window.onload = initApp;

        // Force Safari activation on iOS
        document.body.addEventListener('touchstart', function() {
            if (!synth.speaking) {
                const s = new SpeechSynthesisUtterance("");
                synth.speak(s);
            }
        }, {once: true});

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } 
            if(e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) { return false; } 
        }
        document.addEventListener('selectstart', event => event.preventDefault());
    </script>
</body>
