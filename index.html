<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Success 6 - Interactive English</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; }
        h1, h2, h3, .baloo-font { font-family: 'Baloo 2', cursive; }
        
        .scroll-container { height: calc(100vh - 80px); overflow-y: auto; scroll-behavior: smooth; padding-bottom: 80px; }
        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .glass-card { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; padding: 24px; margin-bottom: 24px; }
        
        .audio-row { cursor: pointer; transition: all 0.2s; border: 2px solid transparent; border-radius: 12px; }
        .audio-row:hover { background-color: #f8fafc; border-color: #cbd5e1; transform: translateX(4px); }
        .active-audio { background-color: #fef08a !important; border-color: #eab308 !important; }
        
        .chat-left { background: #f1f5f9; border-radius: 16px 16px 16px 0; padding: 12px 16px; display: inline-block; border: 1px solid #e2e8f0; max-width: 90%; }
        .chat-right { background: #e0e7ff; border-radius: 16px 16px 0 16px; padding: 12px 16px; display: inline-block; color: #1e3a8a; border: 1px solid #c7d2fe; text-align: left; max-width: 90%;}
        
        .q-btn { transition: all 0.2s; cursor: pointer; }
        .q-selected { background-color: #e0e7ff !important; border-color: #4f46e5 !important; color: #3730a3 !important; font-weight: bold; border-width: 2px;}
        .q-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: bold;}
        .q-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; text-decoration: line-through;}
        .disabled { pointer-events: none; opacity: 0.9;}

        .fill-input { border-bottom: 2px solid #cbd5e1; outline: none; background: transparent; text-align: center; font-weight: bold; color: #4f46e5; padding: 0 5px; transition: all 0.2s; }
        .fill-input:focus { border-bottom-color: #4f46e5; }
        .fill-correct { border-bottom-color: #22c55e !important; color: #166534 !important; background-color: #dcfce7; border-radius: 4px;}
        .fill-wrong { border-bottom-color: #ef4444 !important; color: #991b1b !important; background-color: #fee2e2; border-radius: 4px;}

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #e2e8f0; text-align: left;}
        th { background-color: #f8fafc; font-weight: 700; }

        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background-color: white; z-index: 100; transition: left 0.3s ease-in-out; box-shadow: 4px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 90; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .sidebar-overlay.open { display: block; opacity: 1; }
        
        .module-nav-btn { width: 100%; text-align: left; padding: 12px 16px; border-radius: 12px; font-weight: 600; color: #475569; transition: all 0.2s; margin-bottom: 8px;}
        .module-nav-btn:hover { background-color: #f1f5f9; }
        .module-nav-btn.active { background-color: #e0e7ff; color: #4338ca; border-left: 4px solid #4f46e5; }
        .module-nav-btn.exam-btn { border: 1px solid #fecdd3; background-color: #fff1f2; color: #be123c; }
        .module-nav-btn.exam-btn:hover { background-color: #ffe4e6; }
        .module-nav-btn.exam-btn.active { background-color: #fecdd3; color: #9f1239; border-left: 4px solid #e11d48; }
        
        .sbt-btn { border: 1px solid #fef08a; background-color: #fef9c3; color: #a16207; }
        .sbt-btn:hover { background-color: #fef08a; }
        .sbt-btn.active { background-color: #fde047; color: #854d0e; border-left: 4px solid #eab308; }

        .custom-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s; backdrop-filter: blur(2px);}
        .custom-alert-overlay.active { display: flex; opacity: 1;}
        .custom-alert-box { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: scale(0.9); transition: transform 0.2s;}
        .custom-alert-overlay.active .custom-alert-box { transform: scale(1);}

        /* 1. CSS Chế độ Trình Chiếu (Presentation Mode) */
        body.presentation-mode header, 
        body.presentation-mode .sidebar, 
        body.presentation-mode .sidebar-overlay,
        body.presentation-mode .unit-header-print { 
            display: none !important; 
        }
        body.presentation-mode #main-scroll { 
            height: 100vh !important; 
            padding-top: 20px; 
            font-size: 1.25rem !important; 
        }
        body.presentation-mode .max-w-4xl {
            max-width: 72rem !important;
        }
        body.presentation-mode .glass-card { 
            border: 2px solid #4f46e5 !important; 
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.15) !important; 
            margin-bottom: 40px !important;
        }
        .exit-presentation-btn { 
            display: none; 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 9999; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        body.presentation-mode .exit-presentation-btn { display: flex !important; }

        /* 2. CSS Chế độ In Đề Trắng (Blank Test Print) */
        @media print {
            body.printing-blank-test .q-correct, 
            body.printing-blank-test .q-wrong, 
            body.printing-blank-test .q-selected { 
                background: transparent !important; 
                color: black !important; 
                border-color: #94a3b8 !important; 
                font-weight: normal !important;
                text-decoration: none !important;
            }
            body.printing-blank-test .q-btn { 
                background: transparent !important; 
                border: 1px solid #000 !important; 
                color: #000 !important; 
            }
            body.printing-blank-test .fill-input,
            body.printing-blank-test .fill-correct,
            body.printing-blank-test .fill-wrong { 
                border: none !important; 
                border-bottom: 1px dotted #000 !important; 
                color: transparent !important; 
                background: transparent !important;
            }
            body.printing-blank-test #sbt-action-container, 
            body.printing-blank-test #exam-action-buttons,
            body.printing-blank-test #exam-navigator,
            body.printing-blank-test [id^="exp-"], 
            body.printing-blank-test [id^="exam-exp-"] { 
                display: none !important; 
            }

            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: A4 portrait; margin: 18mm 15mm 20mm 15mm; } 
            body { background: white !important; font-size: 11.5pt !important; color: #111 !important; line-height: 1.5 !important; overflow: visible !important; }
            .scroll-container { height: auto !important; overflow: visible !important; padding: 0 !important; }
            .no-print, header, .sidebar, .sidebar-overlay, #action-buttons, #exam-action-buttons, .submit-btn, .audio-row:hover, #listening-action-buttons, #exam-navigator { display: none !important; }
            
            #content-area { padding: 0 !important; max-width: 100% !important; }
            .glass-card { box-shadow: none !important; border: 1px solid #ccc !important; padding: 15px !important; margin-bottom: 15pt !important; background: transparent !important; page-break-inside: avoid !important; }
            section { page-break-inside: auto !important; margin-bottom: 15pt !important; }
            
            .unit-header-print { text-align: right; border-bottom: 3px solid #4f46e5; padding-bottom: 10px; margin-bottom: 25px; }
            .unit-header-print h1 { font-family: 'Arial', sans-serif !important; font-size: 24pt !important; font-weight: 900 !important; color: #4f46e5 !important; margin: 0; text-transform: uppercase; }
            .unit-header-print h2 { font-family: 'Arial', sans-serif !important; font-size: 12pt !important; font-weight: normal !important; color: #64748b !important; margin: 5px 0 0 0; letter-spacing: 2px; text-transform: uppercase; }
            .print-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12pt !important; }
        
            body.printing-modal #content-area { display: none !important; }
            body.printing-modal #studentReportModal { position: relative !important; display: block !important; width: 100% !important; max-width: 100% !important; background: transparent !important; z-index: auto !important; box-shadow: none !important; }

            body.printing-modal .bg-white.rounded-2xl { box-shadow: none !important; max-height: none !important; overflow: visible !important; }
            body.printing-modal #reportModalContent { overflow: visible !important; background: white !important; }

    </style>

    <!-- FIREBASE INITIALIZATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDocs, getDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZPXXQJXN3Y1mWwYBNCcLjGSusRqjwqrA",
            authDomain: "tienganh6thaykhoadeptrai.firebaseapp.com",
            projectId: "tienganh6thaykhoadeptrai",
            storageBucket: "tienganh6thaykhoadeptrai.firebasestorage.app",
            messagingSenderId: "924106863588",
            appId: "1:924106863588:web:e702ff575534036b950df1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fauth = auth;
        window.fdb = db;
        window.fCollection = collection;
        window.fAddDoc = addDoc;
        window.fDoc = doc;
        window.fSetDoc = setDoc;
        window.fGetDoc = getDoc;
        window.fGetDocs = getDocs;
        window.fUpdateDoc = updateDoc;
        window.fDeleteDoc = deleteDoc;
        window.fQuery = query;
        window.fWhere = where;

        const SUPER_ADMIN_EMAILS = ["khoavuexp2@gmail.com", "khoavuexp@gmail.com"];

        window.loginWithGoogle = async function() {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } 
            catch (error) { console.error(error); window.showCustomAlert("Error", "Login failed.", "⚠️"); }
        }

        window.logoutGoogle = async function() {
            await signOut(auth);
            window.location.reload();
        }

        onAuthStateChanged(auth, async (user) => {
            const authContainer = document.getElementById('auth-container');
            const nicknameOverlay = document.getElementById('nicknameOverlay');
            const printBtn = document.getElementById('print-btn');

            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                let nickname = user.displayName || user.email.split('@')[0];
                let isNewUser = false;
                
                window.isSuperAdmin = SUPER_ADMIN_EMAILS.includes(user.email);
                let userRole = 'student';
                let classId = '';

                if (userSnap.exists()) {
                    const data = userSnap.data();
                    if (data.status === 'blocked') {
                        window.showCustomAlert("Locked", "Your account has been suspended.", "🔒");
                        await signOut(auth); return;
                    }
                    if (data.plan !== 'lifetime' && data.expiryDate && Date.now() > data.expiryDate) {
                        window.showCustomAlert("Expired", "Your learning plan has expired.", "⏳");
                        await signOut(auth); return;
                    }
                    nickname = data.nickname || nickname;
                    userRole = data.role || 'student';
                    classId = data.classId || '';
                } else {
                    isNewUser = true;
                    window.pendingUser = user;
                    nicknameOverlay.classList.add('active');
                    return; 
                }

                window.isAdmin = window.isSuperAdmin || userRole === 'teacher';
                window.currentUser = { uid: user.uid, email: user.email, nickname: nickname, role: userRole, classId: classId, classIds: userSnap.exists() ? userSnap.data().classIds || [] : [] };

                authContainer.innerHTML = `
                    <div class="flex items-center gap-2">
                        <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-200 cursor-pointer hover:bg-indigo-100" onclick="showNicknameModal()">
                            <img src="${user.photoURL || 'https://www.svgrepo.com/show/475656/google-color.svg'}" class="w-6 h-6 rounded-full">
                            <span class="text-sm font-bold text-indigo-700 truncate max-w-[120px] sm:max-w-[200px]">${nickname}</span>
                        </div>
                        <button onclick="logoutGoogle()" class="text-xs text-rose-500 hover:text-rose-700 font-bold whitespace-nowrap ml-1">Sign Out</button>
                    </div>
                `;

                if(printBtn) {
                    if (window.isAdmin) {
                        printBtn.classList.remove('hidden');
                        document.getElementById('present-btn').classList.remove('hidden');
                        window.preloadAdminData(); // PRE-LOAD DATA CHO GIAO BÀI
                    }
                    else {
                        printBtn.classList.add('hidden');
                        document.getElementById('present-btn').classList.add('hidden');
                    }
                }
                
                if (!isNewUser) await updateDoc(userRef, { lastLogin: Date.now() });
                window.renderMenu();

            } else {
                window.currentUser = null; window.isAdmin = false; window.isSuperAdmin = false;
                authContainer.innerHTML = `<button onclick="loginWithGoogle()" class="flex items-center gap-2 bg-white border border-slate-300 shadow-sm text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-xl text-sm font-bold transition-colors"><img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4"> Sign In</button>`;
                
                if(printBtn) {
                    printBtn.classList.add('hidden');
                    document.getElementById('present-btn').classList.add('hidden');
                }
                window.renderMenu();
                
                if (window.currentModule && (window.currentModule.type === 'exam_module' || window.currentModule.id === 'u5') && window.currentModule.id !== 'rev1') {
                    window.showCustomAlert("Required", "Please sign in to continue.", "🔒");
                    window.loadModule('u1');
                }
            }
        });
    </script>
</head>

    <script>
        // --- CHẾ ĐỘ TRÌNH CHIẾU ---
        window.togglePresentationMode = function() {
            document.body.classList.toggle('presentation-mode');
            if (document.body.classList.contains('presentation-mode')) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.getElementById('main-scroll').scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        // --- TTS AUDIO ENGINE ---
        window.voices = [];
        window.speechSynthesis.onvoiceschanged = () => { window.voices = window.speechSynthesis.getVoices(); };
        window.getVoiceByGender = function(gender, lang = 'en-US') {
            if (window.voices.length === 0) window.voices = window.speechSynthesis.getVoices();
            const femaleKeywords = ['female', 'zira', 'samantha', 'victoria', 'karen', 'susan'];
            const maleKeywords = ['male', 'david', 'daniel', 'alex', 'george', 'mark'];
            let selectedVoice = null;
            if (gender === 'female') { selectedVoice = window.voices.find(v => femaleKeywords.some(kw => v.name.toLowerCase().includes(kw))); }

        window.highlightAudioRow = function(element) {
            document.querySelectorAll('.audio-row').forEach(el => el.classList.remove('active-audio'));

                if(row.classList) row.classList.add('active-audio');
            }
        };

        window.removeHighlight = function() { 
            document.querySelectorAll('.audio-row').forEach(el => el.classList.remove('active-audio'));

        window.playAudio = function(element, encodedText, lang = 'en-US') {
            if(window.event) window.event.stopPropagation();

            let text = "";
            try { text = decodeURIComponent(encodedText); } catch(e) { text = encodedText; }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang; utterance.rate = 0.85;
            let voice = window.voices.find(v => v.lang === lang || v.lang.startsWith(lang.split('-')[0]));
            if(voice) utterance.voice = voice;
            utterance.onend = window.removeHighlight; utterance.onerror = window.removeHighlight;
            window.speechSynthesis.speak(utterance);
        };

                { type: "grammar", title: "III. Grammar", content: `<div class="glass-card note-box-print border-l-4 border-l-emerald-500 mb-6"><h3 class="font-bold text-lg text-emerald-800 mb-2 print:text-black">1. Present Simple (Thì Hiện Tại Đơn)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage (Cách dùng):</b><br>• Diễn tả thói quen, hành động lặp đi lặp lại (Habits, routines).<br>• Diễn tả sự thật hiển nhiên, chân lý (General truths).<br>• Diễn tả lịch trình, thời gian biểu cố định của tàu xe, phim ảnh (Timetables).</div><table class="mb-4 bg-white text-sm w-full"><tr><th class="w-1/4 bg-emerald-50 text-emerald-800">(+) Affirmative</th><td><b>I/You/We/They + V</b> <br> <b>He/She/It + V(s/es)</b></td></tr><tr><th class="bg-rose-50 text-rose-800">(-) Negative</th><td>S + <b>don't / doesn't</b> + V(infinitive/nguyên mẫu)</td></tr><tr><th class="bg-amber-50 text-amber-800">(?) Interrogative</th><td><b>Do / Does</b> + S + V(infinitive/nguyên mẫu)?</td></tr></table><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"><div class="bg-rose-50 border border-rose-200 p-4 rounded-xl w-full"><h4 class="font-bold text-rose-800 text-sm mb-2 print:text-black">📝 Adding -s / -es (Quy tắc thêm s/es)</h4><ul class="text-sm space-y-1"><li>• End in <b class="text-rose-600 print:text-black">o, s, x, z, ch, sh</b> ➔ add <b>-es</b> (go ➔ goes)</li><li>• Consonant + <b class="text-rose-600 print:text-black">y</b> ➔ change to <b>-ies</b> (study ➔ studies)</li><li>• Others ➔ add <b>-s</b> (play ➔ plays)</li></ul></div><div class="bg-amber-50 border border-amber-200 p-4 rounded-xl w-full"><h4 class="font-bold text-amber-800 text-sm mb-2 print:text-black">⏳ Adverbs of Frequency (Trạng từ tần suất)</h4><p class="text-sm"><i>always, usually, often, sometimes, never</i></p><p class="text-sm mt-1">• <b>Before normal verbs:</b> I <i>always get</i> up early.</p><p class="text-sm">• <b>After To-Be:</b> He <i>is usually</i> late.</p></div></div></div><div class="glass-card note-box-print border-l-4 border-l-blue-500 mb-6"><h3 class="font-bold text-lg text-blue-800 mb-2 print:text-black">2. Present Continuous (Thì Hiện Tại Tiếp Diễn)</h3><div class="text-sm mb-4 text-slate-700"><b>Usage (Cách dùng):</b><br>• Diễn tả hành động đang xảy ra ngay lúc nói (Happening right now).<br>• Diễn tả một kế hoạch chắc chắn sẽ xảy ra trong tương lai gần (Future arrangements).</div><table class="mb-4 bg-white text-sm w-full"><tr><th class="w-1/4 bg-blue-50 text-blue-800">(+) Affirmative</th><td>S + <b>am/is/are + V-ing</b></td></tr><tr><th class="bg-rose-50 text-rose-800">(-) Negative</th><td>S + <b>am/is/are + NOT + V-ing</b></td></tr><tr><th class="bg-amber-50 text-amber-800">(?) Interrogative</th><td><b>Am/Is/Are</b> + S + <b>V-ing?</b></td></tr></table><div class="bg-cyan-50 border border-cyan-200 p-4 rounded-xl text-sm"><h4 class="font-bold text-cyan-800 mb-2 print:text-black">📝 Adding -ing (Quy tắc thêm -ing):</h4><p>• Remove "e" ➔ add "-ing" (make ➔ making) <br> • 1 vowel between 2 consonants ➔ <b>Double last consonant</b> (run ➔ running).</p></div></div><div class="glass-card note-box-print border-t-4 border-t-purple-500 bg-purple-50/30"><h3 class="font-bold text-lg text-purple-800 mb-2 print:text-black">💡 Distinction (Phân Biệt Nhanh Để Làm Bài Thi)</h3><table class="w-full text-sm bg-white border border-slate-200 shadow-sm"><tr><th class="w-1/2 bg-emerald-100 text-emerald-800 p-3 border-r">Present Simple (HT Đơn)</th><th class="w-1/2 bg-blue-100 text-blue-800 p-3">Present Continuous (HT Tiếp Diễn)</th></tr><tr><td class="p-3 align-top border-r"><b>Dấu hiệu:</b> always, usually, often, sometimes, never, every (day/week)...<br><b>Ví dụ:</b> I <i>play</i> football every Sunday.</td><td class="p-3 align-top"><b>Dấu hiệu:</b> now, right now, at present, at the moment, Look!, Listen!...<br><b>Ví dụ:</b> Look! They <i>are playing</i> football now.</td></tr></table></div>` },

            if(window.database[window.currentClass]) {
                window.database[window.currentClass].modules.forEach(mod => {
                    let btn = `<button onclick="window.loadModule('${mod.id}')" id="nav-${mod.id}" class="module-nav-btn`;

        window.toggleMenu = function() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        window.changeClass = function() {
            window.currentClass = document.getElementById('class-selector').value;
            window.renderMenu();
            if(window.database[window.currentClass].modules.length > 0) window.loadModule(window.database[window.currentClass].modules[0].id);
        }

        window.loadModule = async function(moduleId) {
            if (window.innerWidth < 1024) window.toggleMenu(); 
            
            const mod = window.database[window.currentClass].modules.find(m => m.id === moduleId);
            if (!mod) return;

            window.currentModule = mod;
            document.querySelectorAll('.module-nav-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById('nav-' + moduleId)) document.getElementById('nav-' + moduleId).classList.add('active');
            
            document.getElementById('header-title').innerText = mod.title;
            const printClassTitle = document.getElementById('print-class-title');
            if (printClassTitle) printClassTitle.innerText = window.database[window.currentClass].name;
            const printModuleTitle = document.getElementById('print-module-title');
            if (printModuleTitle) printModuleTitle.innerText = mod.title;
            
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `<div class="text-center py-10 font-bold text-slate-500">Loading data...</div>`;
            
            const sourceNotice = document.getElementById('sbt-source-notice');
            if (sourceNotice) {
                if (mod.type === 'sbt_module') sourceNotice.classList.remove('hidden');
                else sourceNotice.classList.add('hidden');
            }

            if(window.currentExam && window.currentExam.timer) clearInterval(window.currentExam.timer);
            
            let isExamSecure = mod.type === 'exam_module' && mod.id !== 'rev1';
            let isUnit5Secure = mod.id === 'u5';
            
            if ((isExamSecure || isUnit5Secure) && !window.currentUser) {
                contentArea.innerHTML = `
                    <div class="glass-card text-center py-16 border-t-4 border-rose-500">
                        <div class="text-6xl mb-4">🔒</div>
                        <h2 class="text-2xl font-bold text-slate-800 baloo-font mb-2">Login Required</h2>
                        <p class="text-slate-600 mb-6 font-medium">You need to sign in with an authorized account to view this content.</p>
                        <button onclick="window.loginWithGoogle()" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-indigo-700 shadow-md">
                            Sign in now
                        </button>
                    </div>`;
                return;
            }

            if (mod.type === 'lesson') window.renderLessonView(mod, contentArea);
            else if (mod.type === 'exam_module') {
                if(window.renderExamSetupView) window.renderExamSetupView(mod, contentArea);
            }
            else if (mod.type === 'sbt_module') {
                window.sbtShowAll = window.isAdmin ? true : false; 
                window.currentAssignedExercises = [];

                if (window.currentUser) {
                    let targetClassId = window.currentUser.classId || 'unassigned';
                    let hasAssigned = false;

                    try {
                        if (!window.isAdmin) {
                            let studentDocSnap = await window.fGetDoc(window.fDoc(window.fdb, "assignments", `student_${window.currentUser.uid}_${mod.id}`));
                            if (studentDocSnap.exists() && studentDocSnap.data().assignedExercises) {
                                window.currentAssignedExercises = studentDocSnap.data().assignedExercises;
                                hasAssigned = true;
                            }
                        }
                        
                        if (!hasAssigned) {
                            let classDocSnap = await window.fGetDoc(window.fDoc(window.fdb, "assignments", `${targetClassId}_${mod.id}`));
                            if (classDocSnap.exists() && classDocSnap.data().assignedExercises) {
                                window.currentAssignedExercises = classDocSnap.data().assignedExercises;
                                hasAssigned = true;
                            }
                        }

                        if (!hasAssigned) {
                            window.currentAssignedExercises = mod.exercises.map(e => e.id);
                        }
                    } catch(e) { 
                        console.warn("Fetch assignment error, fallback to all.", e);
                        window.currentAssignedExercises = mod.exercises.map(e => e.id);
                    }
                } else {
                    window.currentAssignedExercises = mod.exercises.map(e => e.id);
                }
                
                window.renderSBTView(mod, contentArea);
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.startExam = function(modId) {

            const testId = document.getElementById('exam-test-selector').value;

            let examKey = modId + "_" + testId + "_" + level;
            if(!window.examAttempts[examKey]) window.examAttempts[examKey] = 0;

            window.currentExam = {
                testId: testId,
                level: level,
                questions: mod.tests[testId].levels[level],
                answers: {},
                flagged: {},
                timeLeft: 45 * 60,
                startTime: Date.now(),

            const testData = mod.tests[testId];

            window.scrollTo({ top: 0, behavior: 'smooth' });
            window.renderExamNavigator();

            if(window.currentExam.timer) clearInterval(window.currentExam.timer);
            window.currentExam.timer = setInterval(() => {
                window.currentExam.timeLeft--;
                let m = Math.floor(window.currentExam.timeLeft / 60); let s = window.currentExam.timeLeft % 60;
                let displayStr = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
                let timerEl = document.getElementById('exam-timer-display');
                if(timerEl) timerEl.innerText = displayStr;
                if (window.currentExam.timeLeft <= 0) { clearInterval(window.currentExam.timer); window.submitExam(true); }
            }, 1000);
        }

        window.renderExamNavigator = function() {
            let navHtml = '';
            window.currentExam.questions.forEach((_, idx) => {
                navHtml += `<button onclick="document.getElementById('exam-q-${idx}').scrollIntoView({behavior: 'smooth', block: 'center'})" id="nav-btn-${idx}" class="w-full aspect-square rounded-lg border-2 border-rose-300 text-rose-500 bg-white flex items-center justify-center font-bold text-[15px] hover:scale-105 hover:bg-rose-50 transition-all shadow-sm">${idx + 1}</button>`;
            });
            document.getElementById('exam-navigator').innerHTML = navHtml;
        }

        window.updateExamNavigator = function(idx) {
            let btn = document.getElementById('nav-btn-' + idx);
            if (!btn) return;
            let hasAnswer = window.currentExam.answers[idx] !== undefined;
            let isFlagged = window.currentExam.flagged[idx];

            btn.className = "w-full aspect-square rounded-lg border-2 flex items-center justify-center font-bold text-[15px] hover:scale-105 transition-all shadow-sm cursor-pointer";
            if (isFlagged) {
                btn.classList.add("bg-rose-100", "border-rose-500", "text-rose-600");
                btn.innerHTML = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"></path></svg>`;
            } else if (hasAnswer) {
                btn.classList.add("bg-emerald-500", "border-emerald-600", "text-white");
                btn.innerHTML = idx + 1;
            } else {
                btn.classList.add("bg-white", "border-rose-300", "text-rose-500", "hover:bg-rose-50");
                btn.innerHTML = idx + 1;
            }
        }

        window.toggleExamFlag = function(idx) {
            window.currentExam.flagged[idx] = !window.currentExam.flagged[idx];
            let flagBtn = document.getElementById('flag-btn-' + idx);
            if(window.currentExam.flagged[idx]) {
                flagBtn.classList.add('text-rose-600', 'bg-rose-100', 'border-rose-300');
                flagBtn.classList.remove('text-slate-300', 'bg-slate-50', 'border-slate-200');
            } else {
                flagBtn.classList.remove('text-rose-600', 'bg-rose-100', 'border-rose-300');
                flagBtn.classList.add('text-slate-300', 'bg-slate-50', 'border-slate-200');
            }
            window.updateExamNavigator(idx);
        }

        window.selectExamChoice = function(btn, qIdx, choiceIdx) {
            window.currentExam.answers[qIdx] = choiceIdx;
            const parent = document.getElementById('exam-opts-' + qIdx);
            if(parent) {
                parent.querySelectorAll('.q-btn').forEach(b => b.classList.remove('q-selected'));
                btn.classList.add('q-selected');
            }
            window.updateExamNavigator(qIdx);
        }

        window.submitExam = async function(isTimeout = false) {
            let unanswered = window.currentExam.questions.length - Object.keys(window.currentExam.answers).length;
            if(!isTimeout && unanswered > 0) {
                if(!confirm(`You have ${unanswered} unanswered questions! Submit anyway?`)) return;
            }
            
            clearInterval(window.currentExam.timer);
            window.examAttempts[window.currentExam.examKey]++;
            
            let score = 0;
            let detailedResults = [];
            
            window.currentExam.questions.forEach((q, idx) => {
                let userAnsIdx = window.currentExam.answers[idx];
                let parent = document.getElementById('exam-opts-' + idx);
                let btns = parent.querySelectorAll('.q-btn');
                
                btns.forEach(b => b.classList.add('disabled'));

                let isCorrect = userAnsIdx === q.ans;
                let userAnsText = userAnsIdx !== undefined ? q.opts[userAnsIdx] : "Blank";
                let correctAnsText = q.opts[q.ans];
                detailedResults.push({ q: q.q, userAns: userAnsText, correctAns: correctAnsText, isCorrect: isCorrect });

                // Update navigator color
                let navBtn = document.getElementById('nav-btn-' + idx);

                if (isCorrect) {
                    score++;
                    if(btns[userAnsIdx]) {
                        btns[userAnsIdx].classList.remove('q-selected', 'q-wrong');
                        btns[userAnsIdx].classList.add('q-correct');
                    }
                    if (navBtn) navBtn.className = "w-full aspect-square rounded-lg border-2 border-emerald-600 bg-emerald-500 text-white flex items-center justify-center font-bold text-[15px]";
                } else {
                    if (userAnsIdx !== undefined && btns[userAnsIdx]) { 
                        btns[userAnsIdx].classList.remove('q-selected');
                        btns[userAnsIdx].classList.add('q-wrong');
                    }
                    if (navBtn) navBtn.className = "w-full aspect-square rounded-lg border-2 border-rose-600 bg-rose-500 text-white flex items-center justify-center font-bold text-[15px]";
                }
            });

            let percentage = (score / window.currentExam.questions.length) * 10;
            let timeTaken = Math.floor((Date.now() - window.currentExam.startTime) / 1000);

            if (window.currentUser && !window.isAdmin) {
                try {
                    await window.fAddDoc(window.fCollection(window.fdb, "exam_results"), {
                        uid: window.currentUser.uid, email: window.currentUser.email, nickname: window.currentUser.nickname,
                        classId: window.currentUser.classId || 'unassigned', testId: window.currentExam.testId,
                        level: window.currentExam.level, testName: window.currentModule.title,
                        score: score, total: window.currentExam.questions.length, percentage: percentage,
                        timeTaken: timeTaken, timestamp: Date.now(), isLesson: false, detailedResults: detailedResults 
                    });
                } catch(e) { console.error(e); }
            }

            let resultColor = percentage >= 8 ? "emerald" : (percentage >= 5 ? "amber" : "rose");
            let showExpBtn = (window.examAttempts[window.currentExam.examKey] >= 3 || percentage === 10) 
                ? `<button onclick="window.explainExam()" class="bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-indigo-700 shadow-md">💡 Show Answers & Explanations</button>`
                : `<button class="bg-slate-300 text-slate-500 px-8 py-3.5 rounded-xl font-bold cursor-not-allowed shadow-md" title="Answers unlock after 3 attempts or 100% score">💡 Answers Locked</button>`;

            document.getElementById('exam-action-buttons').innerHTML = `
                <div class="p-8 bg-white border-2 border-${resultColor}-500 rounded-2xl shadow-lg inline-block text-center mb-6 w-full md:w-auto">
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">RESULT</h2>
                    <div class="text-5xl font-extrabold text-${resultColor}-600 mb-2">${score} / ${window.currentExam.questions.length}</div>
                    <p class="text-slate-500 font-medium">Score: ${percentage.toFixed(1)} / 10</p>
                    <p class="text-xs text-slate-400 mt-2">Attempts: ${window.examAttempts[window.currentExam.examKey]}/3</p>
                </div>
                <div class="flex flex-col md:flex-row justify-center gap-4">
                    <button onclick="window.startExam('${window.currentModule.id}')" class="bg-amber-500 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-amber-600 shadow-md">🔄 Try Again</button>
                    ${showExpBtn}
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.explainExam = function() {
            window.currentExam.questions.forEach((q, idx) => {
                let parent = document.getElementById('exam-opts-' + idx);
                if(parent) {
                    let btns = parent.querySelectorAll('.q-btn');
                    if (btns[q.ans]) {
                        btns[q.ans].classList.remove('q-wrong'); 
                        btns[q.ans].classList.add('q-correct');
                    }
                }
                let exp = document.getElementById('exam-exp-' + idx);
                if(exp) exp.classList.remove('hidden');
            });
            window.showCustomAlert("Notice", "Correct answers and explanations are now visible below each question.", "💡");
        }

        window.syncAssignmentUI = async function() {
            const mod = window.currentModule;
            let targetType = document.getElementById('assign-target-select').value;
            let targetId = '';
            let docId = '';
            
            if (targetType.startsWith('class_')) {
                targetId = targetType.replace('class_', '');
                docId = `${targetId}_${mod.id}`;
            } else if (targetType === 'individual') {
                let studentSelect = document.getElementById('assign-student-select');
                targetId = studentSelect ? studentSelect.value : '';
                if(!targetId) {
                    document.getElementById('assignment-list').innerHTML = '<div class="text-center p-4 text-rose-500 font-bold">Please select a specific student!</div>';
                    return;
                }
                docId = `student_${targetId}_${mod.id}`;
            }

            let currentAssigned = [];
            try {
                let docSnap = await window.fGetDoc(window.fDoc(window.fdb, "assignments", docId));
                if (docSnap.exists() && docSnap.data().assignedExercises) {
                    currentAssigned = docSnap.data().assignedExercises;
                } else {
                    currentAssigned = mod.exercises.map(e => e.id);

                currentAssigned = mod.exercises.map(e => e.id);
            }

            mod.exercises.forEach(ex => {

                            <input type="checkbox" value="${ex.id}" class="mt-1 w-5 h-5 accent-indigo-600 assign-checkbox" ${isChecked}>
                            <div>
                                <div class="font-bold text-sm text-indigo-700">${ex.part || 'Exercise'}</div>
                                <div class="text-sm text-slate-700 font-medium">${ex.title}</div>
                            </div>
                         </label>`;
            });
            document.getElementById('assignment-list').innerHTML = html;
        }

        }

        window.saveAssignment = async function() {

            let selectedIds = Array.from(checkboxes).map(cb => cb.value);
            
            let targetSelect = document.getElementById('assign-target-select');

            if (targetType.startsWith('class_')) {
                let classIdToSave = targetType.replace('class_', '');
                docId = `${classIdToSave}_${window.currentModule.id}`;
            } else if (targetType === 'individual') {
                let studentSelect = document.getElementById('assign-student-select');
                let studentId = studentSelect ? studentSelect.value : '';
                if (!studentId) return window.showCustomAlert("Error", "Please select a student!", "⚠️");
                docId = `student_${studentId}_${window.currentModule.id}`;
            }
            
            try {
                let saveBtn = document.getElementById('btn-save-assign');
                let originalText = saveBtn.innerText;
                saveBtn.innerText = "Saving..."; saveBtn.disabled = true;

                await window.fSetDoc(window.fDoc(window.fdb, "assignments", docId), {

                });

                window.showCustomAlert("Error", "Failed to save assignment. Check network.", "⚠️");

            window.sbtShowAll = isChecked;
            window.renderSBTView(window.currentModule, document.getElementById('content-area'));
        }

                        <button onclick="window.togglePresentationMode()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-blue-700 flex items-center gap-2">🖥️ Present</button>
                        <button onclick="window.printBlankTest()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-emerald-700 flex items-center gap-2">🖨️ Print Blank Test</button>
                        <button onclick="window.openAssignmentModal('${mod.id}')" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-amber-600 flex items-center gap-2">⚙️ Assign Homework</button>

                if(ex.note) html += `<p class="text-sm text-slate-600 bg-amber-50 p-3 rounded-lg border border-amber-200 mb-5 font-medium shadow-inner">${ex.note}</p>`;

        window.parseSBTQuestion = function(text, qId) {
            let count = 0;
            return text.replace(/\[fill\]/g, () => {
                let html = `<input type="text" id="fill-${qId}-${count}" oninput="window.saveSBTFill('${window.currentModule.id}', '${qId}', ${count}, this.value)" class="fill-input w-24" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="...">`;
                count++; return html;
            });
        }

        window.selectSBTChoice = function(modId, qId, choiceIdx) {
            let state = window.sbtState[modId];
            if (state.attempts >= 3 || state.locked) return;
            if (state.answers[qId] && state.answers[qId].isCorrect) return; 
            
            state.answers[qId] = { val: choiceIdx };
            const parent = document.getElementById(`opts-${qId}`);
            if(parent) {
                parent.querySelectorAll('.q-btn').forEach(b => b.classList.remove('q-selected'));
                parent.children[choiceIdx].classList.add('q-selected');
            }
        }

        window.saveSBTFill = function(modId, qId, fillIdx, val) {
            let state = window.sbtState[modId];
            if (state.attempts >= 3 || state.locked) return;
            
            if(!state.answers[qId]) state.answers[qId] = { val: [] };
            if(!Array.isArray(state.answers[qId].val)) state.answers[qId].val = [];
            state.answers[qId].val[fillIdx] = val.trim();
        }

        window.submitSBTModule = async function(modId) {
            const mod = window.currentModule;
            let state = window.sbtState[modId];
            if (state.locked) return;

            state.attempts++;
            document.getElementById(`sbt-global-badge-${modId}`).innerText = `Attempts: ${state.attempts}/3`;
            
            let totalQuestions = 0;
            let correctCount = 0;
            let allCorrect = true;
            let detailedResults = [];

            let exercisesToRender = mod.exercises;
            if (!window.sbtShowAll && window.currentAssignedExercises) {
                exercisesToRender = mod.exercises.filter(ex => window.currentAssignedExercises.includes(ex.id));
            }

            exercisesToRender.forEach(ex => {
                ex.questions.forEach((q) => {
                    totalQuestions++;
                    let userAns = state.answers[q.id];
                    let isQCorrect = false;

                    if (ex.type === 'choice') {
                        if (userAns !== undefined && userAns.val === q.ans) isQCorrect = true;
                        
                        const parent = document.getElementById(`opts-${q.id}`);
                        if(parent) {
                            const btns = parent.children;
                            if (isQCorrect) {
                                correctCount++;
                                btns[userAns.val].classList.remove('q-selected', 'q-wrong');
                                btns[userAns.val].classList.add('q-correct', 'disabled');
                                state.answers[q.id].isCorrect = true;
                            } else {
                                allCorrect = false;
                                if (userAns !== undefined && userAns.val !== undefined) {
                                    btns[userAns.val].classList.remove('q-selected');
                                    btns[userAns.val].classList.add('q-wrong');
                                }
                                if (state.attempts >= 3) {
                                    btns[q.ans].classList.add('q-correct');
                                    Array.from(btns).forEach(b => b.classList.add('disabled'));
                                }
                            }
                        }
                        
                        detailedResults.push({
                            q: q.q.replace(/\[fill\]/g, '___'),
                            userAns: userAns ? q.opts[userAns.val] : "Blank",
                            correctAns: q.opts[q.ans],
                            isCorrect: isQCorrect
                        });
                        
                    } else if (ex.type === 'fill') {
                        let qCorrect = true;
                        let uAnsArr = []; let cAnsArr = [];
                        
                        q.ans.forEach((allowedAnsArray, fIdx) => {
                            let uVal = (userAns && userAns.val && userAns.val[fIdx]) ? userAns.val[fIdx].toLowerCase().replace(/\s+/g, ' ').trim() : "";
                            let isBlankCorrect = allowedAnsArray.some(a => a.toLowerCase().replace(/\s+/g, ' ').trim() === uVal);
                            let inputEl = document.getElementById(`fill-${q.id}-${fIdx}`);
                            
                            uAnsArr.push(uVal || "___");
                            cAnsArr.push(allowedAnsArray[0]);

                            if (inputEl) {
                                if (isBlankCorrect) {
                                    inputEl.classList.remove('fill-wrong'); inputEl.classList.add('fill-correct'); inputEl.disabled = true;
                                } else {
                                    qCorrect = false;
                                    inputEl.classList.add('fill-wrong');
                                    if (state.attempts >= 3) {
                                        inputEl.value = allowedAnsArray[0]; 
                                        inputEl.classList.remove('fill-wrong'); inputEl.classList.add('fill-correct'); inputEl.disabled = true;
                                    }
                                }
                            }
                        });
                        
                        if(qCorrect) {
                            correctCount++;
                            state.answers[q.id] = { isCorrect: true };
                        } else {
                            allCorrect = false;
                        }
                        
                        detailedResults.push({
                            q: q.q.replace(/\[fill\]/g, '___'),
                            userAns: uAnsArr.join(' | '),
                            correctAns: cAnsArr.join(' | '),
                            isCorrect: qCorrect
                        });
                    }

                    if (state.attempts >= 3 || isQCorrect) {
                        const expDiv = document.getElementById(`exp-${q.id}`);
                        if(expDiv) expDiv.classList.remove('hidden');
                    }
                });
            });

            if (allCorrect || state.attempts >= 3) {
                state.locked = true;
                let percentage = (correctCount / totalQuestions) * 10;
                
                if (window.currentUser && !window.isAdmin) {
                    try {
                        await window.fAddDoc(window.fCollection(window.fdb, "exam_results"), {
                            uid: window.currentUser.uid, email: window.currentUser.email, nickname: window.currentUser.nickname,
                            classId: window.currentUser.classId || 'unassigned', testId: modId, level: "SBT",
                            testName: window.currentModule.title, score: correctCount, total: totalQuestions,
                            percentage: percentage, timeTaken: 0, timestamp: Date.now(),
                            isLesson: true, detailedResults: detailedResults 
                        });
                    } catch(e) { console.error(e); }
                }

                const actionContainer = document.getElementById(`sbt-action-container-${modId}`);
                let resultColor = percentage >= 8 ? "emerald" : (percentage >= 5 ? "amber" : "rose");

                actionContainer.innerHTML = `
                    <div class="p-6 bg-white border-2 border-${resultColor}-500 rounded-2xl shadow-lg inline-block text-center w-full md:w-auto mb-4">
                        <h2 class="text-xl font-bold text-slate-800 mb-1 baloo-font">RESULT</h2>
                        <div class="text-4xl font-extrabold text-${resultColor}-600 mb-1">${correctCount} / ${totalQuestions}</div>
                        <p class="text-slate-500 font-medium">Score: ${percentage.toFixed(1)} / 10</p>
                        <p class="text-xs font-bold text-slate-400 mt-2">${allCorrect ? "Perfect!" : "Out of attempts. Check the explanations."}</p>
                    </div><br>
                    <button onclick="window.sbtState['${modId}'] = null; window.loadModule('${modId}')" class="bg-slate-200 text-slate-700 px-8 py-3 rounded-xl font-bold hover:bg-slate-300 shadow-sm transition-transform active:scale-95">🔄 Try Again</button>
                `;
                
                let badge = document.getElementById(`sbt-global-badge-${modId}`);
                if(badge) {

                    badge.classList.replace('text-slate-600', 'text-emerald-800');

                }
            }
        }

        window.fetchLeaderboardData = async function() {
            const testId = document.getElementById('lb-test-select').value;
            const level = document.getElementById('lb-level-select').value;
            const timeFilter = document.getElementById('lb-time-filter').value;
            const resContainer = document.getElementById('lb-results');
            resContainer.innerHTML = `<div class="text-center py-10 font-bold text-slate-500">Loading data...</div>`;

            let cutoffTime = 0;
            let now = Date.now();
            if (timeFilter === '7') cutoffTime = now - (7 * 24 * 60 * 60 * 1000);
            if (timeFilter === '30') cutoffTime = now - (30 * 24 * 60 * 60 * 1000);

            try {
                const snapshot = await window.fGetDocs(window.fCollection(window.fdb, "exam_results"));
                let results = [];
                snapshot.forEach(doc => {
                    let d = doc.data();
                    if(d.testId === testId && d.level === level && !d.isLesson) {
                        if (timeFilter === 'all' || d.timestamp >= cutoffTime) {
                            results.push(d);
                        }
                    }
                });

                results.sort((a, b) => b.percentage !== a.percentage ? b.percentage - a.percentage : a.timeTaken - b.timeTaken);

                let html = `<div class="glass-card"><h3 class="text-xl font-bold mb-4 text-slate-800">Top 10 - ${testId.toUpperCase()} (${level.toUpperCase()})</h3><table class="w-full bg-white text-sm">
                    <tr class="bg-amber-50 text-amber-800"><th class="p-3 w-16 text-center">Rank</th><th class="p-3">Student</th><th class="p-3 text-center">Score</th></tr>`;
                
                if (results.length === 0) {
                    html += `<tr><td colspan="3" class="p-4 text-center text-slate-500">No results found in this period.</td></tr>`;
                } else {
                    results.slice(0, 10).forEach((r, idx) => {
                        let medal = idx === 0 ? "🥇" : (idx === 1 ? "🥈" : (idx === 2 ? "🥉" : idx + 1));
                        let isMe = (window.currentUser && r.uid === window.currentUser.uid) ? "bg-amber-100 font-bold" : "";
                        html += `<tr class="border-b ${isMe}">
                            <td class="p-3 font-bold text-lg text-slate-500 text-center">${medal}</td>
                            <td class="p-3 text-slate-800 font-bold">${r.nickname}</td>
                            <td class="p-3 text-center font-extrabold text-indigo-600 text-lg">${r.percentage.toFixed(1)}</td>
                        </tr>`;
                    });
                }
                html += `</table></div>`;
                resContainer.innerHTML = html;
            } catch(e) { resContainer.innerHTML = "Error loading data."; console.error(e); }
        }

        window.resetLeaderboard = async function() {
            if(!window.isAdmin) return;
            const testId = document.getElementById('lb-test-select').value;
            const level = document.getElementById('lb-level-select').value;
            
            if(!confirm(`⚠️ CẢNH BÁO: Thầy/cô có chắc chắn muốn XÓA TOÀN BỘ dữ liệu điểm của ${testId.toUpperCase()} - ${level.toUpperCase()} không?`)) return;

            try {
                const q = window.fQuery(window.fCollection(window.fdb, "exam_results"), window.fWhere("testId", "==", testId), window.fWhere("level", "==", level), window.fWhere("isLesson", "==", false));
                const snap = await window.fGetDocs(q);
                
                if(snap.empty) {
                    window.showCustomAlert("Thông báo", "Không có dữ liệu để xóa.", "ℹ️");
                    return;
                }

                const deletePromises = [];
                snap.forEach(doc => { deletePromises.push(window.fDeleteDoc(doc.ref)); });
                
                await Promise.all(deletePromises);
                window.showCustomAlert("Thành công", `Đã xóa ${deletePromises.length} bản ghi điểm.`, "✅");
                window.fetchLeaderboardData(); // Tải lại bảng trắng
            } catch(e) { console.error("Lỗi xóa Leaderboard:", e); window.showCustomAlert("Lỗi", "Lỗi khi xóa dữ liệu.", "⚠️");}
        }

                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-100 w-full xl:w-auto">
                            ${classSelectHtml} ${actionButtons}
                        </div>
                    </div>`;
                });
                document.getElementById('admin-users-list').innerHTML = uHtml || `<div class="text-center py-12"><p class="text-slate-500 font-bold">No students found.</p></div>`;
            } catch(e) { console.error(e); }
        }

        window.updateUserClass = async function(uid, classId) {
            await window.fUpdateDoc(window.fDoc(window.fdb, "users", uid), { classId: classId });
            window.loadAdminUsers(document.getElementById('main-class-filter').value);
        }
        window.updateUserRole = async function(uid, role) {
            await window.fUpdateDoc(window.fDoc(window.fdb, "users", uid), { role: role });
            window.loadAdminUsers(document.getElementById('main-class-filter').value);
        }
        window.updateUserPlan = async function(uid, plan) {
            let expiryDate = null; let now = Date.now();
            if(plan === 'trial') expiryDate = now + (7 * 24 * 60 * 60 * 1000);
            else if(plan === '3_months') expiryDate = now + (90 * 24 * 60 * 60 * 1000);
            else if(plan === '6_months') expiryDate = now + (180 * 24 * 60 * 60 * 1000);
            await window.fUpdateDoc(window.fDoc(window.fdb, "users", uid), { plan: plan, expiryDate: expiryDate });
            window.loadAdminUsers(document.getElementById('main-class-filter').value);
        }
        window.toggleUserStatus = async function(uid, status) {
            await window.fUpdateDoc(window.fDoc(window.fdb, "users", uid), { status: status });
            window.loadAdminUsers(document.getElementById('main-class-filter').value);
        }
        window.deleteUser = async function(uid) {
            if(confirm("DELETE THIS ACCOUNT PERMANENTLY?")) {
                await window.fDeleteDoc(window.fDoc(window.fdb, "users", uid));
                window.loadAdminUsers(document.getElementById('main-class-filter').value);
            }
        }
        window.exportUsersToCSV = function() {
            if(!window.adminUsersData) return;
            let csvContent = "data:text/csv;charset=utf-8,\uFEFFNickname,Email,Role,Class,Join Date,Plan,Expiry Date,Status\n";
            window.adminUsersData.forEach(user => {
                let className = window.adminClassesData.find(c => c.id === user.classId)?.name || 'Unassigned';
                let joinDate = user.joinDate ? new Date(user.joinDate).toLocaleDateString('en-GB') : 'N/A';
                let expDate = user.plan === 'lifetime' ? 'Lifetime' : (user.expiryDate ? new Date(user.expiryDate).toLocaleDateString('en-GB') : 'N/A');
                csvContent += `"${user.nickname}","${user.email}","${user.role}","${className}","${joinDate}","${user.plan || 'trial'}","${expDate}","${user.status || 'active'}"\n`;
            });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", "students.csv");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        window.openStudentReportModal = async function(uid, nickname) {
            document.getElementById('reportModalTitle').innerText = `Báo cáo của học viên: ${nickname}`;
            const content = document.getElementById('reportModalContent');
            content.innerHTML = `<div class="text-center py-10 font-bold text-slate-500">Đang truy xuất dữ liệu máy chủ...</div>`;
            document.getElementById('studentReportModal').classList.add('active');

            try {
                const snapshot = await window.fGetDocs(window.fCollection(window.fdb, "exam_results"));
                let results = [];
                snapshot.forEach(doc => { 
                    let d = doc.data(); 
                    if (d.uid === uid) {
                        d.docId = doc.id; 
                        results.push(d); 
                    }
                });
                results.sort((a,b) => b.timestamp - a.timestamp);

                window.currentStudentResultsCache = results;

                if (results.length === 0) {
                    content.innerHTML = `<div class="text-center py-10"><p class="text-4xl mb-2">📭</p><p class="font-bold text-slate-500">Học sinh này chưa hoàn thành bài nào.</p></div>`;
                    return;
                }

                // Group by Test ID and Level
                let groupedResults = {};
                results.forEach(r => {
                    let key = `${r.testId}_${r.level}`;
                    if(!groupedResults[key]) groupedResults[key] = [];
                    groupedResults[key].push(r);
                });

                let html = `<div class="space-y-4">`;
                
                for(let key in groupedResults) {
                    let attempts = groupedResults[key];
                    let bestScore = attempts[0]; // Khởi tạo best score là lần thử mới nhất
                    attempts.forEach(a => {
                        if (a.percentage > bestScore.percentage) bestScore = a;
                    });
                    
                    let date = new Date(bestScore.timestamp).toLocaleString('vi-VN');
                    let color = bestScore.percentage >= 8 ? "emerald" : (bestScore.percentage >= 5 ? "amber" : "rose");
                    let badge = bestScore.isLesson ? `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">Luyện Tập</span>` 
                                           : `<span class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-xs font-bold">Bài Kiểm Tra</span>`;

                    html += `<div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between md:items-center gap-4 hover:border-indigo-300 transition-colors">
                        <div>
                            <div class="font-bold text-slate-800 text-lg flex flex-wrap items-center gap-2 mb-1">${bestScore.testName} (${bestScore.level}) ${badge}</div>
                            <div class="text-sm text-slate-500 font-medium flex gap-3">
                                <span>Tốt nhất lúc: ${date}</span>
                                <span class="bg-slate-100 px-2 py-0.5 rounded border border-slate-200">Đã làm: ${attempts.length} lần</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-2xl font-extrabold text-${color}-600 bg-${color}-50 px-3 py-1 rounded-lg border border-${color}-200">${bestScore.percentage.toFixed(1)} <span class="text-sm">/ 10</span></div>
                            <button onclick="window.viewDetailedTest('${bestScore.docId}')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-700 transition-colors">🔍 Xem Lỗi Sai</button>
                        </div>
                    </div>`;
                }
                
                html += `</div>`;
                content.innerHTML = html;

            } catch(e) { console.error(e); content.innerHTML = "<p class='text-center text-rose-600 font-bold py-10'>Lỗi tải dữ liệu.</p>"; }
        }

        window.viewDetailedTest = function(docId) {
            const content = document.getElementById('reportModalContent');
            if(!window.currentStudentResultsCache) return;
            const data = window.currentStudentResultsCache.find(r => r.docId === docId);
            if(!data || !data.detailedResults) {
                content.innerHTML = `
                    <div class="mb-4"><button onclick="window.openStudentReportModal('${data.uid}', '${data.nickname}')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-bold hover:bg-slate-300">⬅ Quay lại danh sách</button></div>
                    <div class="text-center py-10 font-bold text-slate-500">Bài làm này không lưu chi tiết câu sai.</div>`;
                return;
            }

            let html = `
                <div class="flex items-center gap-4 mb-6 border-b pb-4">
                    <button onclick="window.openStudentReportModal('${data.uid}', '${data.nickname}')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 flex items-center gap-2 shrink-0">⬅ Quay lại</button>
                    <div>
                        <h4 class="font-bold text-lg text-indigo-900 leading-tight">${data.testName} (${data.level})</h4>
                        <p class="text-sm text-slate-500">Chi tiết Tờ giấy thi (Best Score)</p>
                    </div>
                </div>
                <div class="space-y-4">`;

            data.detailedResults.forEach((res, i) => {
                let bg = res.isCorrect ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200";
                let badge = res.isCorrect ? `<span class="bg-emerald-500 text-white px-2 py-0.5 rounded text-xs font-bold shadow-sm">ĐÚNG</span>` 
                                          : `<span class="bg-rose-500 text-white px-2 py-0.5 rounded text-xs font-bold shadow-sm">SAI</span>`;
                
                html += `<div class="p-5 rounded-2xl border ${bg} shadow-sm">
                    <div class="flex items-start justify-between gap-4 mb-3">
                        <p class="font-bold text-slate-800 text-[15px]"><span class="text-indigo-600">Câu ${i+1}:</span> ${res.q}</p>
                        ${badge}
                    </div>
                    <div class="bg-white p-3 rounded-xl border border-slate-100 space-y-2 text-sm">
                        <p class="flex items-start gap-2"><span class="text-slate-500 w-28 shrink-0">Học sinh chọn:</span> <b class="${res.isCorrect ? 'text-emerald-700' : 'text-rose-700'}">${res.userAns}</b></p>
                        ${!res.isCorrect ? `<p class="flex items-start gap-2"><span class="text-slate-500 w-28 shrink-0">Đáp án chuẩn:</span> <b class="text-emerald-700">${res.correctAns}</b></p>` : ''}
                    </div>
                </div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
            document.getElementById('studentReportModal').scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = function() {
            // Thiết lập Last Route khi Reload trang nếu cần
            window.initApp();
        };

    </script>
</body>
</html>
