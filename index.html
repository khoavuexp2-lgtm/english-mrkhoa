            html += `<div class="text-center mt-10" id="exam-action-buttons"><button onclick="window.submitExam()" class="bg-rose-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-rose-700 shadow-xl w-full md:w-auto">SUBMIT EXAM</button></div></div>
                    
                    <div class="w-full lg:w-72 shrink-0 no-print order-first lg:order-last">
                        <div class="sticky top-24 bg-white p-5 rounded-2xl border border-slate-200 shadow-md max-h-[60vh] lg:max-h-[75vh] overflow-y-auto">
                            <h3 class="font-bold text-slate-800 baloo-font text-lg mb-4 text-center">Question Board</h3>
                            <div class="grid grid-cols-5 gap-2" id="exam-navigator"></div>
                        </div>
                    </div>
                </div>`;
            
            document.getElementById('content-area').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            window.renderExamNavigator();

            if(window.currentExam.timer) clearInterval(window.currentExam.timer);
            window.currentExam.timer = setInterval(() => {
                window.currentExam.timeLeft--;
                let m = Math.floor(window.currentExam.timeLeft / 60); let s = window.currentExam.timeLeft % 60;
                let displayStr = `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
                let timerEl = document.getElementById('exam-timer-display');
                if(timerEl) timerEl.innerText = displayStr;
                if (window.currentExam.timeLeft <= 0) { clearInterval(window.currentExam.timer); window.submitExam(true); }
            }, 1000);
        }

        window.renderExamNavigator = function() {
            let navHtml = '';
            window.currentExam.questions.forEach((_, idx) => {
                navHtml += `<button onclick="document.getElementById('exam-q-${idx}').scrollIntoView({behavior: 'smooth', block: 'center'})" id="nav-btn-${idx}" class="w-full aspect-square rounded-lg border-2 border-rose-300 text-rose-500 bg-white flex items-center justify-center font-bold text-[15px] hover:scale-105 hover:bg-rose-50 transition-all shadow-sm">${idx + 1}</button>`;
            });
            document.getElementById('exam-navigator').innerHTML = navHtml;
        }

        window.updateExamNavigator = function(idx) {
            let btn = document.getElementById('nav-btn-' + idx);
            if (!btn) return;
            let hasAnswer = window.currentExam.answers[idx] !== undefined;
            let isFlagged = window.currentExam.flagged[idx];

            btn.className = "w-full aspect-square rounded-lg border-2 flex items-center justify-center font-bold text-[15px] hover:scale-105 transition-all shadow-sm cursor-pointer";
            if (isFlagged) {
                btn.classList.add("bg-rose-100", "border-rose-500", "text-rose-600");
                btn.innerHTML = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"></path></svg>`;
            } else if (hasAnswer) {
                btn.classList.add("bg-emerald-500", "border-emerald-600", "text-white");
                btn.innerHTML = idx + 1;
            } else {
                btn.classList.add("bg-white", "border-rose-300", "text-rose-500", "hover:bg-rose-50");
                btn.innerHTML = idx + 1;
            }
        }

        window.toggleExamFlag = function(idx) {
            window.currentExam.flagged[idx] = !window.currentExam.flagged[idx];
            let flagBtn = document.getElementById('flag-btn-' + idx);
            if(window.currentExam.flagged[idx]) {
                flagBtn.classList.add('text-rose-600', 'bg-rose-100', 'border-rose-300');
                flagBtn.classList.remove('text-slate-300', 'bg-slate-50', 'border-slate-200');
            } else {
                flagBtn.classList.remove('text-rose-600', 'bg-rose-100', 'border-rose-300');
                flagBtn.classList.add('text-slate-300', 'bg-slate-50', 'border-slate-200');
            }
            window.updateExamNavigator(idx);
        }

        window.selectExamChoice = function(btn, qIdx, choiceIdx) {
            window.currentExam.answers[qIdx] = choiceIdx;
            const parent = document.getElementById('exam-opts-' + qIdx);
            if(parent) {
                parent.querySelectorAll('.q-btn').forEach(b => b.classList.remove('q-selected'));
                btn.classList.add('q-selected');
            }
            window.updateExamNavigator(qIdx);
        }

        window.submitExam = async function(isTimeout = false) {
            let unanswered = window.currentExam.questions.length - Object.keys(window.currentExam.answers).length;
            if(!isTimeout && unanswered > 0) {
                if(!confirm(`You have ${unanswered} unanswered questions! Submit anyway?`)) return;
            }
            
            clearInterval(window.currentExam.timer);
            window.examAttempts[window.currentExam.examKey]++;
            
            let score = 0;
            let detailedResults = [];
            
            window.currentExam.questions.forEach((q, idx) => {
                let userAnsIdx = window.currentExam.answers[idx];
                let parent = document.getElementById('exam-opts-' + idx);
                let btns = parent.querySelectorAll('.q-btn');
                
                btns.forEach(b => b.classList.add('disabled'));

                let isCorrect = userAnsIdx === q.ans;
                let userAnsText = userAnsIdx !== undefined ? q.opts[userAnsIdx] : "Blank";
                let correctAnsText = q.opts[q.ans];
                detailedResults.push({ q: q.q, userAns: userAnsText, correctAns: correctAnsText, isCorrect: isCorrect });

                // Update navigator color
                let navBtn = document.getElementById('nav-btn-' + idx);

                if (isCorrect) {
                    score++;
                    if(btns[userAnsIdx]) {
                        btns[userAnsIdx].classList.remove('q-selected', 'q-wrong');
                        btns[userAnsIdx].classList.add('q-correct');
                    }
                    if (navBtn) navBtn.className = "w-full aspect-square rounded-lg border-2 border-emerald-600 bg-emerald-500 text-white flex items-center justify-center font-bold text-[15px]";
                } else {
                    if (userAnsIdx !== undefined && btns[userAnsIdx]) { 
                        btns[userAnsIdx].classList.remove('q-selected');
                        btns[userAnsIdx].classList.add('q-wrong');
                    }
                    if (navBtn) navBtn.className = "w-full aspect-square rounded-lg border-2 border-rose-600 bg-rose-500 text-white flex items-center justify-center font-bold text-[15px]";
                }
            });

            let percentage = (score / window.currentExam.questions.length) * 10;
            let timeTaken = Math.floor((Date.now() - window.currentExam.startTime) / 1000);

            if (window.currentUser && !window.isAdmin) {
                try {
                    await window.fAddDoc(window.fCollection(window.fdb, "exam_results"), {
                        uid: window.currentUser.uid, email: window.currentUser.email, nickname: window.currentUser.nickname,
                        classId: window.currentUser.classId || 'unassigned', testId: window.currentExam.testId,
                        level: window.currentExam.level, testName: window.currentModule.title,
                        score: score, total: window.currentExam.questions.length, percentage: percentage,
                        timeTaken: timeTaken, timestamp: Date.now(), isLesson: false, detailedResults: detailedResults 
                    });
                } catch(e) { console.error(e); }
            }

            let resultColor = percentage >= 8 ? "emerald" : (percentage >= 5 ? "amber" : "rose");
            let showExpBtn = (window.examAttempts[window.currentExam.examKey] >= 3 || percentage === 10) 
                ? `<button onclick="window.explainExam()" class="bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-indigo-700 shadow-md">💡 Show Answers & Explanations</button>`
                : `<button class="bg-slate-300 text-slate-500 px-8 py-3.5 rounded-xl font-bold cursor-not-allowed shadow-md" title="Answers unlock after 3 attempts or 100% score">💡 Answers Locked</button>`;

            document.getElementById('exam-action-buttons').innerHTML = `
                <div class="p-8 bg-white border-2 border-${resultColor}-500 rounded-2xl shadow-lg inline-block text-center mb-6 w-full md:w-auto">
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">RESULT</h2>
                    <div class="text-5xl font-extrabold text-${resultColor}-600 mb-2">${score} / ${window.currentExam.questions.length}</div>
                    <p class="text-slate-500 font-medium">Score: ${percentage.toFixed(1)} / 10</p>
                    <p class="text-xs text-slate-400 mt-2">Attempts: ${window.examAttempts[window.currentExam.examKey]}/3</p>
                </div>
                <div class="flex flex-col md:flex-row justify-center gap-4">
                    <button onclick="window.startExam('${window.currentModule.id}')" class="bg-amber-500 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-amber-600 shadow-md">🔄 Try Again</button>
                    ${showExpBtn}
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.explainExam = function() {
            window.currentExam.questions.forEach((q, idx) => {
                let parent = document.getElementById('exam-opts-' + idx);
                if(parent) {
                    let btns = parent.querySelectorAll('.q-btn');
                    if (btns[q.ans]) {
                        btns[q.ans].classList.remove('q-wrong'); 
                        btns[q.ans].classList.add('q-correct');
                    }
                }
                let exp = document.getElementById('exam-exp-' + idx);
                if(exp) exp.classList.remove('hidden');
            });
            window.showCustomAlert("Notice", "Correct answers and explanations are now visible below each question.", "💡");
        }

        window.syncAssignmentUI = async function() {
            const mod = window.currentModule;
            let targetType = document.getElementById('assign-target-select').value;
            let targetId = '';
            let docId = '';
            
            if (targetType.startsWith('class_')) {
                targetId = targetType.replace('class_', '');
                docId = `${targetId}_${mod.id}`;
            } else if (targetType === 'individual') {
                let studentSelect = document.getElementById('assign-student-select');
                targetId = studentSelect ? studentSelect.value : '';
                if(!targetId) {
                    document.getElementById('assignment-list').innerHTML = '<div class="text-center p-4 text-rose-500 font-bold">Please select a specific student!</div>';
                    return;
                }
                docId = `student_${targetId}_${mod.id}`;
            }

            let currentAssigned = [];
            try {
                let docSnap = await window.fGetDoc(window.fDoc(window.fdb, "assignments", docId));
                if (docSnap.exists() && docSnap.data().assignedExercises) {
                    currentAssigned = docSnap.data().assignedExercises;
                } else {
                    currentAssigned = mod.exercises.map(e => e.id); 
                }
            } catch(e) {
                currentAssigned = mod.exercises.map(e => e.id);
            }

            let html = '';
            mod.exercises.forEach(ex => {
                let isChecked = currentAssigned.includes(ex.id) ? 'checked' : '';
                html += `<label class="flex items-start gap-3 p-3 bg-slate-50 rounded-xl border border-slate-200 cursor-pointer hover:bg-indigo-50 mb-2 shadow-sm transition-colors">
                            <input type="checkbox" value="${ex.id}" class="mt-1 w-5 h-5 accent-indigo-600 assign-checkbox" ${isChecked}>
                            <div>
                                <div class="font-bold text-sm text-indigo-700">${ex.part || 'Exercise'}</div>
                                <div class="text-sm text-slate-700 font-medium">${ex.title}</div>
                            </div>
                         </label>`;
            });
            document.getElementById('assignment-list').innerHTML = html;
        }

        window.selectAllAssignments = function(isSelect) {
            document.querySelectorAll('.assign-checkbox').forEach(cb => cb.checked = isSelect);
        }

        window.saveAssignment = async function() {
            let checkboxes = document.querySelectorAll('.assign-checkbox:checked');
            let selectedIds = Array.from(checkboxes).map(cb => cb.value);
            
            let targetSelect = document.getElementById('assign-target-select');
            let targetType = targetSelect ? targetSelect.value : 'class_unassigned';
            let docId = '';

            if (targetType.startsWith('class_')) {
                let classIdToSave = targetType.replace('class_', '');
                docId = `${classIdToSave}_${window.currentModule.id}`;
            } else if (targetType === 'individual') {
                let studentSelect = document.getElementById('assign-student-select');
                let studentId = studentSelect ? studentSelect.value : '';
                if (!studentId) return window.showCustomAlert("Error", "Please select a student!", "⚠️");
                docId = `student_${studentId}_${window.currentModule.id}`;
            }
            
            try {
                let saveBtn = document.getElementById('btn-save-assign');
                let originalText = saveBtn.innerText;
                saveBtn.innerText = "Saving..."; saveBtn.disabled = true;

                await window.fSetDoc(window.fDoc(window.fdb, "assignments", docId), {
                    assignedExercises: selectedIds,
                    updatedAt: Date.now(),
                    assignedBy: window.currentUser.email
                });
                
                saveBtn.innerText = originalText; saveBtn.disabled = false;
                document.getElementById('assignmentModal').classList.remove('active');
                window.showCustomAlert("Success", "Homework assignment saved successfully!", "✅");
                
                window.loadModule(window.currentModule.id);
            } catch(e) { 
                console.error(e); 
                window.showCustomAlert("Error", "Failed to save assignment. Check network.", "⚠️");
            }
        }

        window.toggleSBTShowAll = function(isChecked) {
            window.sbtShowAll = isChecked;
            window.renderSBTView(window.currentModule, document.getElementById('content-area'));
        }

        window.renderSBTView = function(mod, container) {
            let teacherToolbarHtml = '';
            if (window.isAdmin) {
                teacherToolbarHtml = `
                    <div class="flex flex-wrap gap-2 mb-6 bg-indigo-50 p-3 rounded-xl border border-indigo-200 no-print">
                        <span class="font-bold text-indigo-800 flex items-center mr-2">👨‍🏫 Teacher Tools:</span>
                        <button onclick="window.togglePresentationMode()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-blue-700 flex items-center gap-2">🖥️ Present</button>
                        <button onclick="window.printBlankTest()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-emerald-700 flex items-center gap-2">🖨️ Print Blank Test</button>
                        <button onclick="window.openAssignmentModal('${mod.id}')" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-amber-600 flex items-center gap-2">⚙️ Assign Homework</button>

                    <label class="flex items-center gap-2 cursor-pointer bg-white p-2 rounded-lg border border-slate-200 shadow-sm">

                        <span class="text-sm font-bold text-slate-700">Show all exercises (Self-study)</span>

            let html = teacherToolbarHtml + `

                            <div class="flex flex-col sm:flex-row gap-3 sm:items-center">
                                ${studentToggleHtml}
                            </div>
                        </div>`;
            
            if(!window.sbtState[mod.id]) window.sbtState[mod.id] = { answers: {}, locked: false, attempts: 0 };

            }

            if (exercisesToRender.length === 0) {
                container.innerHTML = html + `<div class="glass-card text-center py-12"><div class="text-5xl mb-3">📭</div><p class="text-slate-500 font-bold text-lg">No homework assigned yet.</p></div>`;

            exercisesToRender.forEach((ex) => {
                html += `<div class="glass-card mb-8 exercise-container" id="ex-container-${ex.id}">

                                <span class="text-xs font-bold text-indigo-500 uppercase bg-indigo-50 px-2 py-1 rounded">${ex.part || 'Exercise'}</span>
                                <h3 class="font-bold text-lg text-slate-800 mt-2">${ex.title}</h3>
                            </div>`;
                
                if(ex.note) html += `<p class="text-sm text-slate-600 bg-amber-50 p-3 rounded-lg border border-amber-200 mb-5 font-medium shadow-inner">${ex.note}</p>`;

                ex.questions.forEach((q, qIdx) => {
                    html += `<div><p class="font-bold text-slate-800 mb-3 text-[15px] leading-relaxed">${window.parseSBTQuestion(q.q, q.id)}</p>`;

                        });
                        html += `</div>`;
                    }
                    html += `<div id="exp-${q.id}" class="hidden mt-3 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-800"><b>💡 Explanation:</b> ${q.exp}</div></div>`;

                html += `</div></div>`;

                     </div>`;

        window.parseSBTQuestion = function(text, qId) {
            let count = 0;
            return text.replace(/\[fill\]/g, () => {
                let html = `<input type="text" id="fill-${qId}-${count}" oninput="window.saveSBTFill('${window.currentModule.id}', '${qId}', ${count}, this.value)" class="fill-input w-24" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="...">`;
                count++; return html;
            });
        }

        window.selectSBTChoice = function(modId, qId, choiceIdx) {
            let state = window.sbtState[modId];
            if (state.attempts >= 3 || state.locked) return;
            if (state.answers[qId] && state.answers[qId].isCorrect) return; 
            
            state.answers[qId] = { val: choiceIdx };
            const parent = document.getElementById(`opts-${qId}`);
            if(parent) {
                parent.querySelectorAll('.q-btn').forEach(b => b.classList.remove('q-selected'));
                parent.children[choiceIdx].classList.add('q-selected');
            }
        }

        window.saveSBTFill = function(modId, qId, fillIdx, val) {
            let state = window.sbtState[modId];
            if (state.attempts >= 3 || state.locked) return;
            
            if(!state.answers[qId]) state.answers[qId] = { val: [] };
            if(!Array.isArray(state.answers[qId].val)) state.answers[qId].val = [];
            state.answers[qId].val[fillIdx] = val.trim();
        }

        window.submitSBTModule = async function(modId) {
            const mod = window.currentModule;
            let state = window.sbtState[modId];
            if (state.locked) return;

            state.attempts++;
            document.getElementById(`sbt-global-badge-${modId}`).innerText = `Attempts: ${state.attempts}/3`;
            
            let totalQuestions = 0;
            let correctCount = 0;
            let allCorrect = true;
            let detailedResults = [];

            let exercisesToRender = mod.exercises;
            if (!window.sbtShowAll && window.currentAssignedExercises) {
                exercisesToRender = mod.exercises.filter(ex => window.currentAssignedExercises.includes(ex.id));
            }

            exercisesToRender.forEach(ex => {
                ex.questions.forEach((q) => {
                    totalQuestions++;
                    let userAns = state.answers[q.id];
                    let isQCorrect = false;

                    if (ex.type === 'choice') {
                        if (userAns !== undefined && userAns.val === q.ans) isQCorrect = true;
                        
                        const parent = document.getElementById(`opts-${q.id}`);
                        if(parent) {
                            const btns = parent.children;
                            if (isQCorrect) {
                                correctCount++;
                                btns[userAns.val].classList.remove('q-selected', 'q-wrong');
                                btns[userAns.val].classList.add('q-correct', 'disabled');
                                state.answers[q.id].isCorrect = true;
                            } else {
                                allCorrect = false;
                                if (userAns !== undefined && userAns.val !== undefined) {
                                    btns[userAns.val].classList.remove('q-selected');
                                    btns[userAns.val].classList.add('q-wrong');
                                }
                                if (state.attempts >= 3) {
                                    btns[q.ans].classList.add('q-correct');
                                    Array.from(btns).forEach(b => b.classList.add('disabled'));
                                }
                            }
                        }
                        
                        detailedResults.push({
                            q: q.q.replace(/\[fill\]/g, '___'),
                            userAns: userAns ? q.opts[userAns.val] : "Blank",
                            correctAns: q.opts[q.ans],
                            isCorrect: isQCorrect
                        });
                        
                    } else if (ex.type === 'fill') {
                        let qCorrect = true;
                        let uAnsArr = []; let cAnsArr = [];
                        
                        q.ans.forEach((allowedAnsArray, fIdx) => {
                            let uVal = (userAns && userAns.val && userAns.val[fIdx]) ? userAns.val[fIdx].toLowerCase().replace(/\s+/g, ' ').trim() : "";
                            let isBlankCorrect = allowedAnsArray.some(a => a.toLowerCase().replace(/\s+/g, ' ').trim() === uVal);
                            let inputEl = document.getElementById(`fill-${q.id}-${fIdx}`);
                            
                            uAnsArr.push(uVal || "___");
                            cAnsArr.push(allowedAnsArray[0]);

                            if (inputEl) {
                                if (isBlankCorrect) {
                                    inputEl.classList.remove('fill-wrong'); inputEl.classList.add('fill-correct'); inputEl.disabled = true;
                                } else {
                                    qCorrect = false;
                                    inputEl.classList.add('fill-wrong');
                                    if (state.attempts >= 3) {
                                        inputEl.value = allowedAnsArray[0]; 
                                        inputEl.classList.remove('fill-wrong'); inputEl.classList.add('fill-correct'); inputEl.disabled = true;
                                    }
                                }
                            }
                        });
                        
                        if(qCorrect) {
                            correctCount++;
                            state.answers[q.id] = { isCorrect: true };
                        } else {
                            allCorrect = false;
                        }
                        
                        detailedResults.push({
                            q: q.q.replace(/\[fill\]/g, '___'),
                            userAns: uAnsArr.join(' | '),
                            correctAns: cAnsArr.join(' | '),
                            isCorrect: qCorrect
                        });
                    }

                    if (state.attempts >= 3 || isQCorrect) {
                        const expDiv = document.getElementById(`exp-${q.id}`);
                        if(expDiv) expDiv.classList.remove('hidden');
                    }
                });
            });

            if (allCorrect || state.attempts >= 3) {
                state.locked = true;
                let percentage = (correctCount / totalQuestions) * 10;
                
                if (window.currentUser && !window.isAdmin) {
                    try {
                        await window.fAddDoc(window.fCollection(window.fdb, "exam_results"), {
                            uid: window.currentUser.uid, email: window.currentUser.email, nickname: window.currentUser.nickname,
                            classId: window.currentUser.classId || 'unassigned', testId: modId, level: "SBT",
                            testName: window.currentModule.title, score: correctCount, total: totalQuestions,
                            percentage: percentage, timeTaken: 0, timestamp: Date.now(),
                            isLesson: true, detailedResults: detailedResults 
                        });
                    } catch(e) { console.error(e); }
                }

                const actionContainer = document.getElementById(`sbt-action-container-${modId}`);
                let resultColor = percentage >= 8 ? "emerald" : (percentage >= 5 ? "amber" : "rose");

                actionContainer.innerHTML = `
                    <div class="p-6 bg-white border-2 border-${resultColor}-500 rounded-2xl shadow-lg inline-block text-center w-full md:w-auto mb-4">

                        <p class="text-slate-500 font-medium">Score: ${percentage.toFixed(1)} / 10</p>
                        <p class="text-xs font-bold text-slate-400 mt-2">${allCorrect ? "Perfect!" : "Out of attempts. Check the explanations."}</p>
                    </div><br>
                    <button onclick="window.sbtState['${modId}'] = null; window.loadModule('${modId}')" class="bg-slate-200 text-slate-700 px-8 py-3 rounded-xl font-bold hover:bg-slate-300 shadow-sm transition-transform active:scale-95">🔄 Try Again</button>
                `;
                
                let badge = document.getElementById(`sbt-global-badge-${modId}`);

                }
            }
        }

        window.fetchLeaderboardData = async function() {
            const testId = document.getElementById('lb-test-select').value;
            const level = document.getElementById('lb-level-select').value;
            const timeFilter = document.getElementById('lb-time-filter').value;
            const resContainer = document.getElementById('lb-results');
            resContainer.innerHTML = `<div class="text-center py-10 font-bold text-slate-500">Loading data...</div>`;

            let cutoffTime = 0;
            let now = Date.now();
            if (timeFilter === '7') cutoffTime = now - (7 * 24 * 60 * 60 * 1000);
            if (timeFilter === '30') cutoffTime = now - (30 * 24 * 60 * 60 * 1000);

            try {
                const snapshot = await window.fGetDocs(window.fCollection(window.fdb, "exam_results"));
                let results = [];
                snapshot.forEach(doc => {
                    let d = doc.data();
                    if(d.testId === testId && d.level === level && !d.isLesson) {
                        if (timeFilter === 'all' || d.timestamp >= cutoffTime) {
                            results.push(d);
                        }
                    }
                });

                results.sort((a, b) => b.percentage !== a.percentage ? b.percentage - a.percentage : a.timeTaken - b.timeTaken);

                let html = `<div class="glass-card"><h3 class="text-xl font-bold mb-4 text-slate-800">Top 10 - ${testId.toUpperCase()} (${level.toUpperCase()})</h3><table class="w-full bg-white text-sm">
                    <tr class="bg-amber-50 text-amber-800"><th class="p-3 w-16 text-center">Rank</th><th class="p-3">Student</th><th class="p-3 text-center">Score</th></tr>`;
                
                if (results.length === 0) {
                    html += `<tr><td colspan="3" class="p-4 text-center text-slate-500">No results found in this period.</td></tr>`;
                } else {
                    results.slice(0, 10).forEach((r, idx) => {
                        let medal = idx === 0 ? "🥇" : (idx === 1 ? "🥈" : (idx === 2 ? "🥉" : idx + 1));
                        let isMe = (window.currentUser && r.uid === window.currentUser.uid) ? "bg-amber-100 font-bold" : "";
                        html += `<tr class="border-b ${isMe}">
                            <td class="p-3 font-bold text-lg text-slate-500 text-center">${medal}</td>
                            <td class="p-3 text-slate-800 font-bold">${r.nickname}</td>
                            <td class="p-3 text-center font-extrabold text-indigo-600 text-lg">${r.percentage.toFixed(1)}</td>
                        </tr>`;
                    });
                }
                html += `</table></div>`;
                resContainer.innerHTML = html;
            } catch(e) { resContainer.innerHTML = "Error loading data."; console.error(e); }
        }

        window.resetLeaderboard = async function() {
            if(!window.isAdmin) return;
            const testId = document.getElementById('lb-test-select').value;
            const level = document.getElementById('lb-level-select').value;
            
            if(!confirm(`⚠️ CẢNH BÁO: Thầy/cô có chắc chắn muốn XÓA TOÀN BỘ dữ liệu điểm của ${testId.toUpperCase()} - ${level.toUpperCase()} không?`)) return;

            try {
                const q = window.fQuery(window.fCollection(window.fdb, "exam_results"), window.fWhere("testId", "==", testId), window.fWhere("level", "==", level), window.fWhere("isLesson", "==", false));
                const snap = await window.fGetDocs(q);
                
                if(snap.empty) {
                    window.showCustomAlert("Thông báo", "Không có dữ liệu để xóa.", "ℹ️");
                    return;
                }

                const deletePromises = [];
                snap.forEach(doc => { deletePromises.push(window.fDeleteDoc(doc.ref)); });
                
                await Promise.all(deletePromises);
                window.showCustomAlert("Thành công", `Đã xóa ${deletePromises.length} bản ghi điểm.`, "✅");
                window.fetchLeaderboardData(); // Tải lại bảng trắng
            } catch(e) { console.error("Lỗi xóa Leaderboard:", e); window.showCustomAlert("Lỗi", "Lỗi khi xóa dữ liệu.", "⚠️");}
        }

                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-100 w-full xl:w-auto">
                            ${classSelectHtml} ${actionButtons}
                        </div>
                    </div>`;
                });
                document.getElementById('admin-users-list').innerHTML = uHtml || `<div class="text-center py-12"><p class="text-slate-500 font-bold">No students found.</p></div>`;
            } catch(e) { console.error(e); }
        }

        window.updateUserClass = async function(uid, classId) {
            await window.fUpdateDoc(window.fDoc(window.fdb, "users", uid), { classId: classId });
            window.loadAdminUsers(document.getElementById('main-class-filter').value);
        }
        window.updateUserRole = async function(uid, role) {
            await window.fUpdateDoc(window.fDoc(window.fdb, "users", uid), { role: role });
            window.loadAdminUsers(document.getElementById('main-class-filter').value);
        }
        window.updateUserPlan = async function(uid, plan) {
            let expiryDate = null; let now = Date.now();
            if(plan === 'trial') expiryDate = now + (7 * 24 * 60 * 60 * 1000);
            else if(plan === '3_months') expiryDate = now + (90 * 24 * 60 * 60 * 1000);
            else if(plan === '6_months') expiryDate = now + (180 * 24 * 60 * 60 * 1000);
            await window.fUpdateDoc(window.fDoc(window.fdb, "users", uid), { plan: plan, expiryDate: expiryDate });
            window.loadAdminUsers(document.getElementById('main-class-filter').value);
        }
        window.toggleUserStatus = async function(uid, status) {
            await window.fUpdateDoc(window.fDoc(window.fdb, "users", uid), { status: status });
            window.loadAdminUsers(document.getElementById('main-class-filter').value);
        }
        window.deleteUser = async function(uid) {
            if(confirm("DELETE THIS ACCOUNT PERMANENTLY?")) {
                await window.fDeleteDoc(window.fDoc(window.fdb, "users", uid));
                window.loadAdminUsers(document.getElementById('main-class-filter').value);
            }
        }
        window.exportUsersToCSV = function() {
            if(!window.adminUsersData) return;
            let csvContent = "data:text/csv;charset=utf-8,\uFEFFNickname,Email,Role,Class,Join Date,Plan,Expiry Date,Status\n";
            window.adminUsersData.forEach(user => {
                let className = window.adminClassesData.find(c => c.id === user.classId)?.name || 'Unassigned';
                let joinDate = user.joinDate ? new Date(user.joinDate).toLocaleDateString('en-GB') : 'N/A';
                let expDate = user.plan === 'lifetime' ? 'Lifetime' : (user.expiryDate ? new Date(user.expiryDate).toLocaleDateString('en-GB') : 'N/A');
                csvContent += `"${user.nickname}","${user.email}","${user.role}","${className}","${joinDate}","${user.plan || 'trial'}","${expDate}","${user.status || 'active'}"\n`;
            });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", "students.csv");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        window.openStudentReportModal = async function(uid, nickname) {
            document.getElementById('reportModalTitle').innerText = `Báo cáo của học viên: ${nickname}`;
            const content = document.getElementById('reportModalContent');
            content.innerHTML = `<div class="text-center py-10 font-bold text-slate-500">Đang truy xuất dữ liệu máy chủ...</div>`;
            document.getElementById('studentReportModal').classList.add('active');

            try {
                const snapshot = await window.fGetDocs(window.fCollection(window.fdb, "exam_results"));
                let results = [];
                snapshot.forEach(doc => { 
                    let d = doc.data(); 
                    if (d.uid === uid) {
                        d.docId = doc.id; 
                        results.push(d); 
                    }
                });
                results.sort((a,b) => b.timestamp - a.timestamp);

                window.currentStudentResultsCache = results;

                if (results.length === 0) {
                    content.innerHTML = `<div class="text-center py-10"><p class="text-4xl mb-2">📭</p><p class="font-bold text-slate-500">Học sinh này chưa hoàn thành bài nào.</p></div>`;
                    return;
                }

                // Group by Test ID and Level
                let groupedResults = {};
                results.forEach(r => {
                    let key = `${r.testId}_${r.level}`;
                    if(!groupedResults[key]) groupedResults[key] = [];
                    groupedResults[key].push(r);
                });

                let html = `<div class="space-y-4">`;
                
                for(let key in groupedResults) {
                    let attempts = groupedResults[key];
                    let bestScore = attempts[0]; // Khởi tạo best score là lần thử mới nhất
                    attempts.forEach(a => {
                        if (a.percentage > bestScore.percentage) bestScore = a;
                    });
                    
                    let date = new Date(bestScore.timestamp).toLocaleString('vi-VN');
                    let color = bestScore.percentage >= 8 ? "emerald" : (bestScore.percentage >= 5 ? "amber" : "rose");
                    let badge = bestScore.isLesson ? `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">Luyện Tập</span>` 
                                           : `<span class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-xs font-bold">Bài Kiểm Tra</span>`;

                    html += `<div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between md:items-center gap-4 hover:border-indigo-300 transition-colors">
                        <div>
                            <div class="font-bold text-slate-800 text-lg flex flex-wrap items-center gap-2 mb-1">${bestScore.testName} (${bestScore.level}) ${badge}</div>
                            <div class="text-sm text-slate-500 font-medium flex gap-3">
                                <span>Tốt nhất lúc: ${date}</span>
                                <span class="bg-slate-100 px-2 py-0.5 rounded border border-slate-200">Đã làm: ${attempts.length} lần</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-2xl font-extrabold text-${color}-600 bg-${color}-50 px-3 py-1 rounded-lg border border-${color}-200">${bestScore.percentage.toFixed(1)} <span class="text-sm">/ 10</span></div>
                            <button onclick="window.viewDetailedTest('${bestScore.docId}')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-700 transition-colors">🔍 Xem Lỗi Sai</button>
                        </div>
                    </div>`;
                }
                
                html += `</div>`;
                content.innerHTML = html;

            } catch(e) { console.error(e); content.innerHTML = "<p class='text-center text-rose-600 font-bold py-10'>Lỗi tải dữ liệu.</p>"; }
        }

        window.viewDetailedTest = function(docId) {
            const content = document.getElementById('reportModalContent');
            if(!window.currentStudentResultsCache) return;
            const data = window.currentStudentResultsCache.find(r => r.docId === docId);
            if(!data || !data.detailedResults) {
                content.innerHTML = `
                    <div class="mb-4"><button onclick="window.openStudentReportModal('${data.uid}', '${data.nickname}')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-bold hover:bg-slate-300">⬅ Quay lại danh sách</button></div>
                    <div class="text-center py-10 font-bold text-slate-500">Bài làm này không lưu chi tiết câu sai.</div>`;
                return;
            }

            let html = `
                <div class="flex items-center gap-4 mb-6 border-b pb-4">
                    <button onclick="window.openStudentReportModal('${data.uid}', '${data.nickname}')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 flex items-center gap-2 shrink-0">⬅ Quay lại</button>
                    <div>
                        <h4 class="font-bold text-lg text-indigo-900 leading-tight">${data.testName} (${data.level})</h4>
                        <p class="text-sm text-slate-500">Chi tiết Tờ giấy thi (Best Score)</p>
                    </div>
                </div>
                <div class="space-y-4">`;

            data.detailedResults.forEach((res, i) => {
                let bg = res.isCorrect ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200";
                let badge = res.isCorrect ? `<span class="bg-emerald-500 text-white px-2 py-0.5 rounded text-xs font-bold shadow-sm">ĐÚNG</span>` 
                                          : `<span class="bg-rose-500 text-white px-2 py-0.5 rounded text-xs font-bold shadow-sm">SAI</span>`;
                
                html += `<div class="p-5 rounded-2xl border ${bg} shadow-sm">
                    <div class="flex items-start justify-between gap-4 mb-3">
                        <p class="font-bold text-slate-800 text-[15px]"><span class="text-indigo-600">Câu ${i+1}:</span> ${res.q}</p>
                        ${badge}
                    </div>
                    <div class="bg-white p-3 rounded-xl border border-slate-100 space-y-2 text-sm">
                        <p class="flex items-start gap-2"><span class="text-slate-500 w-28 shrink-0">Học sinh chọn:</span> <b class="${res.isCorrect ? 'text-emerald-700' : 'text-rose-700'}">${res.userAns}</b></p>
                        ${!res.isCorrect ? `<p class="flex items-start gap-2"><span class="text-slate-500 w-28 shrink-0">Đáp án chuẩn:</span> <b class="text-emerald-700">${res.correctAns}</b></p>` : ''}
                    </div>
                </div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
            document.getElementById('studentReportModal').scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.initApp = function() {
            const selector = document.getElementById('class-selector');
            selector.innerHTML = '';
            for (let cId in window.database) {
                selector.innerHTML += `<option value="${cId}">${window.database[cId].name}</option>`;
            }
            window.renderMenu();
            if(window.database[window.currentClass].modules.length > 0) {
                window.loadModule(window.database[window.currentClass].modules[0].id);
            }
        };

        window.onload = function() {
            window.initApp();
        };

    </script>
</body>
</html>
